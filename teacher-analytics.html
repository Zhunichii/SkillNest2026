<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics ครู - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
                * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        h1, h2, h3, .logo, .logo-mock, .course-title, .card-stat-value,
        .page-title, .nav-logo, .section-title, .avatar-header-title,
        .modal-title, .stat-value, .quiz-title {
            font-family: var(--font-display, 'Space Grotesk', sans-serif);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image:
                var(--bg-grad),
                radial-gradient(circle at 1px 1px, var(--dot-grid) 1px, transparent 0);
            background-size: var(--bg-grad-size, 100% 100%), 26px 26px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Top Nav ── */
        .top-nav {
            position: fixed; top:0; left:0; right:0; height:70px;
            background: var(--nav-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            display: grid; grid-template-columns: 1fr 2fr 1fr;
            align-items: center; padding: 0 30px; z-index: 1000;
        }
        .logo-section {
            display:flex; align-items:center; gap:10px;
            font-weight:600; font-size:1.2rem;
            text-decoration:none; color:var(--text-main);
        }
        .logo-icon { background:var(--primary-blue); padding:4px 8px; border-radius:6px; font-size:0.9rem; }
        .nav-right { display:flex; align-items:center; justify-content:flex-end; gap:16px; }
        .back-btn {
            background:var(--card-bg); border:1px solid var(--border-color);
            color:var(--text-dim); padding:8px 16px; border-radius:8px;
            cursor:pointer; font-size:0.9rem; text-decoration:none;
            display:flex; align-items:center; gap:6px; transition:0.3s;
        }
        .back-btn:hover { background:rgba(59,130,246,0.1); color:var(--text-main); border-color:var(--primary-blue); }
        .nav-user {
            background: var(--primary-blue); border:none; color:white;
            padding:8px 16px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer;
        }

        /* ── Sidebar ── */
        .sidebar {
            position:fixed; left:0; top:70px; width:250px;
            height:calc(100vh - 70px);
            background:var(--nav-bg); backdrop-filter:blur(15px);
            border-right:1px solid var(--border-color); padding:30px 20px;
        }
        .sidebar-item {
            display:flex; align-items:center; gap:12px;
            padding:12px 15px; color:var(--text-dim);
            text-decoration:none; border-radius:8px;
            margin-bottom:8px; transition:0.3s; cursor:pointer;
        }
        .sidebar-item:hover { background:rgba(59,130,246,0.1); color:var(--text-main); }
        .sidebar-item.active { background:rgba(59,130,246,0.1); color:var(--text-main); }

        /* ── Main Content ── */
        .main-content { margin-left:250px; margin-top:70px; padding:40px; min-height:calc(100vh - 70px); }

        /* ── Page Header ── */
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; }
        .page-title { font-size:1.8rem; font-weight:600; }
        .page-title span { color:var(--text-dim); font-size:1rem; font-weight:400; margin-left:12px; }

        /* ── Course Filter Tabs ── */
        .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
        .filter-tab {
            padding:8px 18px; border-radius:8px;
            border:1px solid var(--border-color); background:var(--card-bg);
            color:var(--text-dim); cursor:pointer; font-size:0.85rem; transition:0.3s;
            white-space:nowrap;
        }
        .filter-tab:hover { border-color:var(--primary-blue); color:var(--text-main); }
        .filter-tab.active { background:var(--primary-blue); border-color:var(--primary-blue); color:white; }
        .filter-tab.all.active { background:var(--primary-blue); }

        /* ── Stat Cards ── */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:28px; }
        .stat-card {
            background:var(--card-bg); border:1px solid var(--border-color);
            border-radius:16px; padding:24px; transition:0.3s;
        }
        .stat-card:hover { border-color:rgba(59,130,246,0.3); background:var(--card-hover); }
        .stat-label { color:var(--text-dim); font-size:0.85rem; margin-bottom:10px; }
        .stat-value { font-size:2rem; font-weight:600; margin-bottom:6px; }
        .stat-sub { font-size:0.8rem; }
        .stat-sub.up   { color:var(--success); }
        .stat-sub.warn { color:var(--warning); }
        .stat-sub a    { color:var(--warning); text-decoration:none; }
        .stat-sub a:hover { text-decoration:underline; }

        /* ── Grid layouts ── */
        .mid-grid   { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:28px; }
        .bottom-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:28px; }
        .full-card  { margin-bottom:28px; }

        /* ── Card ── */
        .card { background:var(--card-bg); border:1px solid var(--border-color); border-radius:16px; padding:24px; }
        .card-title { font-size:1rem; font-weight:600; margin-bottom:20px; color:var(--text-main); }

        /* ── Progress Bars ── */
        .progress-item { margin-bottom:18px; }
        .progress-row { display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:6px; }
        .progress-row span:last-child { color:var(--text-dim); }
        .progress-track { width:100%; background:var(--card-hover); height:6px; border-radius:10px; overflow:hidden; }
        .progress-fill  { height:100%; border-radius:10px; transition:width 0.6s ease; }

        /* ── AI Card ── */
        .ai-card {
            background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.06));
            border: 1px solid rgba(139,92,246,0.25); border-radius:16px; padding:24px;
        }
        .ai-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .ai-card-title  { font-size:1rem; font-weight:600; }
        .ai-badge { background:rgba(139,92,246,0.25); color:#c4b5fd; font-size:0.72rem; padding:3px 10px; border-radius:99px; margin-left:8px; }
        .btn-reanalyze {
            background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.35);
            color:#c4b5fd; padding:6px 14px; border-radius:8px; font-size:0.82rem; cursor:pointer; transition:0.2s;
        }
        .btn-reanalyze:hover { background:rgba(139,92,246,0.3); }
        .ai-content { font-size:0.88rem; line-height:1.8; color:var(--text-main); }
        .ai-section-head { color:#c4b5fd; font-weight:600; margin-top:10px; margin-bottom:4px; }
        .ai-spinner { display:flex; align-items:center; gap:10px; color:var(--text-dim); }
        .spinner-sm { width:16px; height:16px; border:2px solid var(--primary-purple); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Student Table ── */
        .student-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .student-table th { color:var(--text-dim); font-weight:500; text-align:left; padding:8px 12px; border-bottom:1px solid var(--border-color); }
        .student-table td { padding:10px 12px; border-bottom:1px solid var(--line); }
        .student-table tr:last-child td { border-bottom:none; }
        .student-table tr:hover td { background:var(--card-hover); }
        .progress-pill { height:6px; background:var(--card-hover); border-radius:99px; overflow:hidden; width:80px; }
        .progress-pill-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary-purple),var(--primary-blue)); }
        .status-badge { font-size:0.72rem; padding:3px 8px; border-radius:99px; font-weight:500; }
        .status-done     { background:rgba(16,185,129,0.15); color:var(--success); }
        .status-progress { background:rgba(59,130,246,0.15); color:var(--primary-blue); }
        .status-new      { background:var(--card-hover); color:var(--text-dim); }

        /* ── HW Summary ── */
        .hw-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border-color); }
        .hw-row:last-child { border-bottom:none; }
        .hw-name { font-size:0.88rem; }
        .hw-meta { font-size:0.78rem; color:var(--text-dim); margin-top:2px; }
        .hw-stats { display:flex; gap:16px; }
        .hw-stat { text-align:center; }
        .hw-stat-val { font-weight:700; font-size:1rem; }
        .hw-stat-lbl { color:var(--text-dim); font-size:0.7rem; }

        /* ── Skill rows (quiz per course) ── */
        .skill-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border-color); font-size:0.88rem; }
        .skill-row:last-child { border-bottom:none; }
        .skill-badge { padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .badge-green  { background:rgba(16,185,129,0.15); color:var(--success); }
        .badge-yellow { background:rgba(245,158,11,0.15); color:var(--warning); }
        .badge-red    { background:rgba(239,68,68,0.15); color:var(--danger); }

        /* ── Loading ── */
        .page-loading { display:flex; align-items:center; justify-content:center; min-height:60vh; flex-direction:column; gap:16px; color:var(--text-dim); }
        .spinner-lg { width:36px; height:36px; border:3px solid rgba(139,92,246,0.3); border-top-color:var(--primary-purple); border-radius:50%; animation:spin 0.9s linear infinite; }

        /* ── Empty ── */
        .empty-box { text-align:center; padding:48px 24px; color:var(--text-dim); grid-column:1/-1; }
        .empty-box h3 { color:var(--text-main); margin-bottom:8px; }

        /* ── Review Queue (ตรวจข้อเรียงความ) ── */
        .review-item {
            background:var(--card-hover); border:1px solid var(--border-color);
            border-radius:12px; padding:16px; margin-bottom:12px;
        }
        .review-item:last-child { margin-bottom:0; }
        .review-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
        .review-meta { font-size:0.78rem; color:var(--text-dim); }
        .review-question { font-weight:600; font-size:0.92rem; margin-bottom:6px; }
        .review-answer {
            background:var(--card-bg); border:1px solid var(--border-color); border-radius:8px;
            padding:10px 12px; font-size:0.88rem; margin-bottom:10px; white-space:pre-wrap; line-height:1.6;
        }
        .review-grade-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .review-grade-row input[type=number] {
            width:80px; padding:6px 10px; border-radius:8px;
            border:1px solid var(--border-color); background:var(--card-bg); color:var(--text-main);
        }
        .btn-save-review {
            background:var(--primary-blue); color:white; border:none; padding:7px 16px;
            border-radius:8px; font-size:0.85rem; cursor:pointer;
        }
        .btn-save-review:hover { opacity:0.9; }
        .btn-save-review:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-ai-review {
            background:linear-gradient(135deg,#8b5cf6,#3b82f6); color:white; border:none; padding:7px 16px;
            border-radius:8px; font-size:0.85rem; cursor:pointer;
        }
        .btn-ai-review:hover { opacity:0.92; }
        .btn-ai-review:disabled { opacity:0.5; cursor:not-allowed; }
        .review-ai-suggestion {
            background:rgba(139,92,246,0.08); border:1px solid rgba(139,92,246,0.25);
            border-left:3px solid #8b5cf6; border-radius:8px; padding:10px 12px;
            font-size:0.85rem; color:#c4b5fd; margin-bottom:10px; line-height:1.5;
        }

        /* ── Student Score Table ── */
        .score-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .score-table th { color:var(--text-dim); font-weight:500; text-align:left; padding:8px 12px; border-bottom:1px solid var(--border-color); }
        .score-table td { padding:10px 12px; border-bottom:1px solid var(--line); }
        .score-table tr:last-child td { border-bottom:none; }
        .score-table tr:hover td { background:var(--card-hover); }
        .score-pill { padding:3px 10px; border-radius:20px; font-size:0.78rem; font-weight:600; }

        /* ── Quiz Question Breakdown ── */
        .qbreak-item { padding:14px 0; border-bottom:1px solid var(--border-color); }
        .qbreak-item:last-child { border-bottom:none; }
        .qbreak-q { font-weight:600; font-size:0.9rem; margin-bottom:8px; }
        .qbreak-choice-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:0.82rem; }
        .qbreak-choice-label { width:22px; color:var(--text-dim); }
        .qbreak-bar-track { flex:1; height:8px; background:var(--card-hover); border-radius:4px; overflow:hidden; }
        .qbreak-bar-fill { height:100%; border-radius:4px; background:var(--primary-blue); }
        .qbreak-bar-fill.correct-fill { background:var(--success); }
        .qbreak-pct { width:38px; text-align:right; color:var(--text-dim); font-size:0.78rem; }

        @media(max-width:900px) {
            .stats-grid  { grid-template-columns:repeat(2,1fr); }
            .mid-grid, .bottom-grid { grid-template-columns:1fr; }
            .sidebar { display:none; }
            .main-content { margin-left:0; }
        }
    </style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
    <a href="dashboard.html" class="logo-section">
        <span class="logo-icon">W</span>
        <span>SkillNest</span>
    </a>
    <div></div>
    <div class="nav-right">
        <a href="dashboard.html" class="back-btn">← กลับหน้าหลัก</a>
        <button class="nav-user" id="navUser">👤 ครู</button>
    </div>
</nav>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-item" onclick="window.location.href='dashboard.html'">🔍 <span>ค้นหาคอร์สใหม่</span></div>
    <div class="sidebar-item" onclick="window.location.href='dashboard.html?page=my-courses'">📚 <span>คอร์สของฉัน</span></div>
    <div class="sidebar-item" onclick="window.location.href='create-course.html'">➕ <span>เพิ่มคอร์ส</span></div>
    <div class="sidebar-item" onclick="window.location.href='homework.html'">📋 <span>ตรวจการบ้าน</span></div>
    <div class="sidebar-item active">📊 <span>Analytics</span></div>
</aside>

<!-- Main -->
<main class="main-content" id="mainContent">
    <div class="page-loading" id="pageLoading">
        <div class="spinner-lg"></div>
        <span>กำลังโหลดข้อมูล...</span>
    </div>
</main>

<script type="module">
import { supabase } from './supabase.js';

// ── State ──
let currentUser  = null;
let allCourses   = [];
let allEnrolls   = [];
let allSubs      = [];
let allQuiz      = [];
let selectedId   = 'all';
let barChart     = null;
let pieChart     = null;
let quizChart    = null;

// อ่านค่าสีจาก CSS variable ของธีมปัจจุบัน เพื่อให้กราฟ Chart.js เปลี่ยนตามธีมด้วย
function themeVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
}

// ── Init ──
async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'login-page/login.html'; return; }

    const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
    if (!profile || profile.user_type !== 'teacher') { window.location.href = 'dashboard.html'; return; }

    currentUser = user;
    document.getElementById('navUser').textContent = `👤 ${profile.first_name || 'ครู'}`;

    await fetchAll();
    document.getElementById('pageLoading').style.display = 'none';
    renderPage();
    runAI();
}

// ── Fetch ──
async function fetchAll() {
    const { data: courses } = await supabase.from('courses').select('*').eq('creator_id', currentUser.id).order('created_at', { ascending: false });
    allCourses = courses || [];
    if (!allCourses.length) return;

    const ids = allCourses.map(c => c.id);
    const [{ data: e }, { data: s }, { data: q }] = await Promise.all([
        supabase.from('enrollments')
            .select('*, users(id, first_name, last_name, email, user_type)')
            .in('course_id', ids),
        supabase.from('submissions').select('*').in('course_id', ids),
        supabase.from('quiz_scores').select('*').in('course_id', ids)
    ]);

    // ไม่ต้องกรองอะไรเพิ่ม — ครูที่ enroll คอร์สตัวเองถูกลบออกจาก DB แล้ว
    // แค่กรอง null ออก
    allEnrolls = (e || []).filter(en => en.user_id && en.course_id);
    allSubs    = s || [];
    allQuiz    = q || [];
}

// ── Filter ──
function filtered() {
    if (selectedId === 'all') return { enrolls: allEnrolls, subs: allSubs, quiz: allQuiz, courses: allCourses };
    return {
        enrolls: allEnrolls.filter(x => x.course_id === selectedId),
        subs:    allSubs.filter(x => x.course_id === selectedId),
        quiz:    allQuiz.filter(x => x.course_id === selectedId),
        courses: allCourses.filter(x => x.id === selectedId)
    };
}

// ── Render Page ──
function renderPage() {
    const main = document.getElementById('mainContent');

    if (!allCourses.length) {
        main.innerHTML = `
        <div class="page-header"><div><h1 class="page-title">Analytics <span>ครู</span></h1></div></div>
        <div class="empty-box"><h3>ยังไม่มีคอร์ส</h3><p>สร้างคอร์สแรกของคุณก่อนนะครับ</p></div>`;
        return;
    }
    // ป้องกัน element ที่ยังไม่ได้ render

    main.innerHTML = `
    <!-- Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Analytics <span>ภาพรวมคอร์สของคุณ</span></h1>
        </div>
        <div class="filter-tabs" id="courseFilter"></div>
    </div>

    <!-- Stat Cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- AI Card (full width) -->
    <div class="ai-card full-card" id="aiCard">
        <div class="ai-card-header">
            <div class="ai-card-title">🤖 AI วิเคราะห์ภาพรวมการสอน <span class="ai-badge">Groq LLaMA</span></div>
            <button class="btn-reanalyze" onclick="runAI()">🔄 วิเคราะห์ใหม่</button>
        </div>
        <div class="ai-content" id="aiContent">
            <div class="ai-spinner"><div class="spinner-sm"></div><span>กำลังวิเคราะห์...</span></div>
        </div>
    </div>

    <!-- Review Queue: ตรวจข้อเรียงความ/ตอบสั้นที่รอตรวจ -->
    <div class="card full-card" id="reviewQueueCard" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <div class="card-title" style="margin-bottom:0;">🖊️ รอตรวจข้อเรียงความ <span id="reviewQueueCount" style="font-size:0.8rem;color:var(--text-dim);font-weight:400;"></span></div>
            <button class="btn-ai-review" onclick="aiGradeAllReviewItems()" id="btnAiGradeAll">🤖 ให้ AI ช่วยตรวจทั้งหมด</button>
        </div>
        <div id="reviewQueueList" style="margin-top:14px;"></div>
    </div>

    <!-- Mid: Progress + Pie -->
    <div class="mid-grid">
        <div class="card">
            <div class="card-title">ความคืบหน้าเฉลี่ยรายคอร์ส</div>
            <div id="courseProgressList"><div style="color:var(--text-dim);font-size:0.9rem;">กำลังโหลด...</div></div>
        </div>
        <div class="card">
            <div class="card-title">สัดส่วนสถานะนักเรียน</div>
            <div style="position:relative;height:200px;"><canvas id="pieChart"></canvas></div>
        </div>
    </div>

    <!-- Student Score Table (full width) -->
    <div class="card full-card">
        <div class="card-title">📊 คะแนนนักเรียนรายบุคคล <span id="scoreTableCount" style="font-size:0.8rem;color:var(--text-dim);font-weight:400;"></span></div>
        <div id="studentScoreTable"></div>
    </div>

    <!-- Quiz Question Breakdown (full width, เฉพาะตอนเลือกคอร์สเดียว) -->
    <div class="card full-card" id="qBreakdownCard" style="display:none;">
        <div class="card-title">🔍 รายละเอียดคำถาม Quiz รายข้อ</div>
        <div id="quizQuestionBreakdown"></div>
    </div>

    <!-- Bottom: Students + HW + Quiz -->
    <div class="bottom-grid">
        <div class="card">
            <div class="card-title">👥 รายชื่อนักเรียน <span id="studentCount" style="font-size:0.8rem;color:var(--text-dim);font-weight:400;"></span></div>
            <div id="studentTable"></div>
        </div>
        <div class="card">
            <div class="card-title">📋 สรุปการบ้าน</div>
            <div id="hwSummary"></div>
        </div>
        <div class="card">
            <div class="card-title">🎯 Quiz รายคอร์ส</div>

    <!-- Full: Bar Chart -->
    <div class="card full-card">

// ── Course Filter ──
function renderFilter() {
    const el = document.getElementById('courseFilter');
    let html = `<button class="filter-tab all ${selectedId==='all'?'active':''}" onclick="selectCourse('all',this)">🌐 ทุกคอร์ส</button>`;
    allCourses.forEach(c => {
        const t = c.title.length > 12 ? c.title.slice(0,12)+'…' : c.title;
        html += `<button class="filter-tab ${selectedId===c.id?'active':''}" onclick="selectCourse('${c.id}',this)">${t}</button>`;
    });

}

window.selectCourse = function(id, btn) {
    selectedId = id;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateAll();
    runAI();
};

// ── Update All ──
function updateAll() {
    const { enrolls, subs, quiz, courses } = filtered();
    renderStats(enrolls, subs, quiz);
    renderProgressList(enrolls, courses);
    renderPie(enrolls);
    renderStudentTable(enrolls);
    renderReviewQueue(subs, quiz, courses);
    renderStudentScoreTable(enrolls, subs, quiz, courses);
    renderQuizQuestionBreakdown(quiz, courses);
    renderHwSummary(subs, courses);
    renderQuizSummary(quiz, courses);
    renderBarChart(enrolls, courses);
}

// ── Stats ──
function renderStats(enrolls, subs, quiz) {
    const done    = enrolls.filter(e => (e.progress||0) >= 100).length;
    const avgProg = enrolls.length ? Math.round(enrolls.reduce((s,e)=>s+(e.progress||0),0)/enrolls.length) : 0;
    const avgQuiz = quiz.length ? Math.round(quiz.reduce((s,q)=>s+(q.pct||0),0)/quiz.length) : 0;
    const pending = subs.filter(s => s.status==='submitted').length;

    document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
        <div class="stat-label">นักเรียนทั้งหมด</div>
        <div class="stat-value">${enrolls.length} <small style="font-size:1rem;color:var(--text-dim)">คน</small></div>
        <div class="stat-sub up">${done} คนเรียนจบแล้ว</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Progress เฉลี่ย</div>
        <div class="stat-value">${avgProg} <small style="font-size:1rem;color:var(--text-dim)">%</small></div>
        <div class="stat-sub ${avgProg>=70?'up':''}">${avgProg>=70?'📈 ดีมาก':'📊 ยังพัฒนาได้'}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">คะแนน Quiz เฉลี่ย</div>
        <div class="stat-value">${quiz.length?avgQuiz:'—'} <small style="font-size:1rem;color:var(--text-dim)">${quiz.length?'%':''}</small></div>
        <div class="stat-sub">${quiz.length} คนทำ Quiz</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">การบ้านรอตรวจ</div>
        <div class="stat-value">${pending} <small style="font-size:1rem;color:var(--text-dim)">งาน</small></div>
        <div class="stat-sub warn"><a href="homework.html">ไปตรวจ →</a></div>
    </div>`;
}

// ── Progress List ──
function renderProgressList(enrolls, courses) {
    const el = document.getElementById('courseProgressList');
    if (!courses.length) { el.innerHTML = '<div style="color:var(--text-dim);">ไม่มีข้อมูล</div>'; return; }

    const colors = ['#8b5cf6','#10b981','#f59e0b','#3b82f6','#ef4444','#06b6d4'];
    el.innerHTML = courses.map((c,i) => {
        const ce   = enrolls.filter(e => e.course_id===c.id);
        const avg  = ce.length ? Math.round(ce.reduce((s,e)=>s+(e.progress||0),0)/ce.length) : 0;
        const done = ce.filter(e=>(e.progress||0)>=100).length;
        return `<div class="progress-item">
            <div class="progress-row">
                <span>${c.title}</span>
                <span style="display:flex;gap:8px;align-items:center;">
                    <span style="font-size:0.75rem;color:var(--text-dim);">✅ ${done}/${ce.length} คน</span>
                    <span>${avg}%</span>
                </span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${avg}%;background:${colors[i%colors.length]}"></div></div>
        </div>`;
    }).join('');
}

// ── Pie Chart ──
function renderPie(enrolls) {
    const done   = enrolls.filter(e=>(e.progress||0)>=100).length;
    const inProg = enrolls.filter(e=>(e.progress||0)>0&&(e.progress||0)<100).length;
    const fresh  = enrolls.filter(e=>(e.progress||0)===0).length;
    const ctx = document.getElementById('pieChart');
    if (!ctx) return;
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
        type:'doughnut',
        data:{
            labels:['เรียนจบ','กำลังเรียน','ยังไม่เริ่ม'],
            datasets:[{ data:[done,inProg,fresh], backgroundColor:['#10b981','#3b82f6', themeVar('--card-hover','rgba(255,255,255,0.08)')], borderWidth:0, hoverOffset:6 }]
        },
        options:{
            responsive:true, maintainAspectRatio:false, cutout:'65%',
            plugins:{ legend:{ position:'bottom', labels:{ color:themeVar('--text-dim','#a0a0ba'), font:{ size:11 }, padding:16 } } }
        }
    });
}

// ── Student Table ──
function renderStudentTable(enrolls) {
    const el = document.getElementById('studentTable');
    document.getElementById('studentCount').textContent = `${enrolls.length} คน`;
    if (!enrolls.length) { el.innerHTML = '<div style="color:var(--text-dim);padding:12px 0;">ยังไม่มีนักเรียน</div>'; return; }

    const rows = enrolls.slice(0,8).map(e => {
        const u    = e.users;
        const name = u ? `${u.first_name||''} ${u.last_name||''}`.trim() || u.email : e.user_id.slice(0,8)+'…';
        const pct  = e.progress || 0;
        const course = allCourses.find(c=>c.id===e.course_id)?.title || '';
        const sc   = pct>=100?'status-done':pct>0?'status-progress':'status-new';

            <td><div style="display:flex;align-items:center;gap:8px;"><div class="progress-pill"><div class="progress-pill-fill" style="width:${pct}%"></div></div><span style="font-size:0.78rem;color:var(--text-dim);">${pct}%</span></div></td>

        </tr></thead>
        <tbody>${rows}</tbody>

}

// ── ชื่อผู้ใช้จาก user_id (lookup จาก allEnrolls ที่ join ตาราง users มาแล้ว) ──
function getUserName(userId) {
    const en = allEnrolls.find(e => e.user_id === userId);
    if (en && en.users) {
        const u = en.users;
        return `${u.first_name||''} ${u.last_name||''}`.trim() || u.email || userId.slice(0,8)+'…';
    }
    return userId.slice(0,8)+'…';
}

// ── Review Queue: ข้อตอบสั้น/เรียงความที่รอตรวจ (ทั้งจาก Quiz และการบ้านแบบฟอร์ม) ──
function renderReviewQueue(subs, quiz, courses) {
    const card = document.getElementById('reviewQueueCard');
    const listEl = document.getElementById('reviewQueueList');
    const countEl = document.getElementById('reviewQueueCount');

    const items = [];

    quiz.filter(q => q.needs_review).forEach(qs => {
        const course = allCourses.find(c => c.id === qs.course_id);
        const qDef = (course?.quiz || []);
        (qs.answers || []).forEach((a, ai) => {
            if (a.type === 'short_answer' && a.needsReview) {
                const def = qDef.find(q => q.question === a.question);
                items.push({
                    kind: 'quiz', userId: qs.user_id, courseId: qs.course_id, courseTitle: course?.title || '',
                    question: a.question, answerText: a.answerText, maxPoints: a.maxPoints || 1, answerIndex: ai,
                    sampleAnswer: def?.sampleAnswer || ''
                });
            }
        });
    });

    subs.filter(s => s.submission_kind === 'form' && Array.isArray(s.form_answers)).forEach(sub => {
        const course = allCourses.find(c => c.id === sub.course_id);
        const hwDef = course?.homework?.[sub.homework_index];
        const qDef = hwDef?.formQuestions || [];
        (sub.form_answers || []).forEach((a, ai) => {
            if (a.type === 'short_answer' && a.needsReview) {
                const def = qDef.find(q => q.question === a.question);
                items.push({
                    kind: 'submission', rowId: sub.id, userId: sub.user_id, courseId: sub.course_id, courseTitle: course?.title || '',
                    homeworkTitle: sub.homework_title, question: a.question, answerText: a.answerText,
                    maxPoints: a.maxPoints || 1, answerIndex: ai,
                    sampleAnswer: def?.sampleAnswer || ''
                });
            }
        });
    });

    if (!items.length) { card.style.display = 'none'; window._reviewQueueItems = []; return; }
    card.style.display = 'block';
    countEl.textContent = `${items.length} ข้อ`;
    window._reviewQueueItems = items;

    listEl.innerHTML = items.map((it, i) => `
        <div class="review-item">
            <div class="review-header">
                <div>
                    <div style="font-weight:600;">${getUserName(it.userId)}</div>
                    <div class="review-meta">${it.courseTitle}${it.homeworkTitle ? ' • การบ้าน: ' + it.homeworkTitle : ' • Quiz'}</div>
                </div>
                <div class="review-meta">เต็ม ${it.maxPoints} คะแนน</div>
            </div>
            <div class="review-question">${it.question}</div>
            <div class="review-answer">${(it.answerText || '(ไม่ได้ตอบ)').replace(/</g,'&lt;')}</div>
            <div id="review-ai-note-${i}"></div>
            <div class="review-grade-row">
                <label style="font-size:0.85rem;color:var(--text-dim);">ให้คะแนน:</label>
                <input type="number" min="0" max="${it.maxPoints}" step="0.5" id="review-score-${i}" placeholder="0-${it.maxPoints}">
                <button class="btn-ai-review" onclick="aiGradeReviewItem(${i})" id="review-ai-btn-${i}">🤖 ให้ AI ช่วยตรวจ</button>
                <button class="btn-save-review" onclick="saveReviewItem(${i})">บันทึกคะแนน</button>
                <span id="review-status-${i}" style="font-size:0.8rem;color:var(--success);"></span>
            </div>
        </div>
    `).join('');
}

window.aiGradeAllReviewItems = async function() {
    const items = window._reviewQueueItems || [];
    if (!items.length) return;
    const bulkBtn = document.getElementById('btnAiGradeAll');
    bulkBtn.disabled = true;
    const originalText = bulkBtn.textContent;
    for (let i = 0; i < items.length; i++) {
        bulkBtn.textContent = `🤖 กำลังตรวจ ${i+1}/${items.length}...`;
        // ข้ามข้อที่บันทึกไปแล้ว (input ถูก disable หลังกดบันทึกคะแนน)
        const input = document.getElementById(`review-score-${i}`);
        if (input && input.disabled) continue;
        try {
            await aiGradeReviewItem(i);
        } catch (e) { /* ข้ามไปข้อถัดไปถ้าข้อใดข้อหนึ่ง error */ }
    }
    bulkBtn.disabled = false;
    bulkBtn.textContent = originalText;
};

window.aiGradeReviewItem = async function(i) {
    const it = window._reviewQueueItems[i];
    const btn = document.getElementById(`review-ai-btn-${i}`);
    const noteEl = document.getElementById(`review-ai-note-${i}`);
    btn.disabled = true;
    btn.textContent = 'AI กำลังตรวจ...';
    noteEl.innerHTML = '';
    try {
        const res = await fetch('/api/grade-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: it.question,
                answerText: it.answerText,
                sampleAnswer: it.sampleAnswer,
                maxPoints: it.maxPoints
            })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById(`review-score-${i}`).value = data.suggestedScore;
        noteEl.innerHTML = `
            <div class="review-ai-suggestion">
                🤖 AI เสนอ ${data.suggestedScore}/${it.maxPoints} คะแนน — ${data.reasoning || ''}
                <span style="display:block;color:var(--text-dim);font-size:0.74rem;margin-top:3px;">เป็นแค่ข้อเสนอแนะ ตรวจสอบและแก้คะแนนก่อนกด "บันทึกคะแนน" ได้ตามดุลยพินิจ</span>
            </div>`;
    } catch (e) {
        noteEl.innerHTML = `<div class="review-ai-suggestion" style="color:#f87171;">เกิดข้อผิดพลาด: ${e.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '🤖 ให้ AI ช่วยตรวจ';
    }
};

window.saveReviewItem = async function(i) {
    const it = window._reviewQueueItems[i];
    const input = document.getElementById(`review-score-${i}`);
    const statusEl = document.getElementById(`review-status-${i}`);
    const btn = input.closest('.review-grade-row').querySelector('.btn-save-review');
    const points = parseFloat(input.value);
    if (isNaN(points) || points < 0 || points > it.maxPoints) {
        alert(`กรุณาใส่คะแนน 0-${it.maxPoints}`);
        return;
    }
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
    try {
        if (it.kind === 'quiz') await saveQuizReview(it, points);
        else await saveSubmissionReview(it, points);
        statusEl.textContent = '✅ บันทึกแล้ว';
        btn.textContent = 'บันทึกแล้ว';
        input.disabled = true;
        await fetchAll();
        updateAll();
    } catch(e) {
        alert('เกิดข้อผิดพลาด: ' + e.message);
        btn.disabled = false; btn.textContent = 'บันทึกคะแนน';
    }
};

async function saveQuizReview(it, points) {
    const row = allQuiz.find(q => q.user_id === it.userId && q.course_id === it.courseId);
    if (!row) throw new Error('ไม่พบข้อมูล quiz');
    const answers = (row.answers || []).map((a, idx) => idx === it.answerIndex
        ? { ...a, pointsEarned: points, needsReview: false, isCorrect: points >= (a.maxPoints || 1) }
        : a);
    const newScore = answers.reduce((s,a) => s + (a.pointsEarned || 0), 0);
    const newPct = row.total > 0 ? Math.round((newScore/row.total)*100) : 0;
    const stillPending = answers.some(a => a.needsReview);
    const { error } = await supabase.from('quiz_scores')
        .update({ answers, score: newScore, pct: newPct, needs_review: stillPending })
        .eq('user_id', row.user_id).eq('course_id', row.course_id);
    if (error) throw error;
}

async function saveSubmissionReview(it, points) {
    const row = allSubs.find(s => s.id === it.rowId);
    if (!row) throw new Error('ไม่พบข้อมูลการส่งงาน');
    const answers = (row.form_answers || []).map((a, idx) => idx === it.answerIndex
        ? { ...a, pointsEarned: points, needsReview: false, isCorrect: points >= (a.maxPoints || 1) }
        : a);
    const maxTotal = answers.reduce((s,a) => s + (a.maxPoints || 1), 0);
    const earned = answers.reduce((s,a) => s + (a.pointsEarned || 0), 0);
    const course = allCourses.find(c => c.id === row.course_id);
    const hw = course?.homework?.[row.homework_index];
    const scaledGrade = maxTotal > 0 ? Math.round((earned/maxTotal) * (hw?.maxScore || 100)) : 0;
    const stillPending = answers.some(a => a.needsReview);
    const { error } = await supabase.from('submissions')
        .update({
            form_answers: answers, needs_review: stillPending,
            status: stillPending ? 'submitted' : 'graded',
            grade: stillPending ? null : scaledGrade
        })
        .eq('id', row.id);
    if (error) throw error;
}

// ── Quiz Question Breakdown: รายละเอียดต่อข้อ (เฉพาะตอนเลือกคอร์สเดียว) ──
function renderQuizQuestionBreakdown(quiz, courses) {
    const card = document.getElementById('qBreakdownCard');
    const el = document.getElementById('quizQuestionBreakdown');
    if (selectedId === 'all' || courses.length !== 1 || !courses[0].quiz || !courses[0].quiz.length || !quiz.length) {
        card.style.display = 'none';
        return;
    }
    card.style.display = 'block';
    const course = courses[0];
    const labels = ['A','B','C','D'];

    el.innerHTML = course.quiz.map((q, qi) => {
        const qType = q.type || 'multiple_choice';
        // จับคู่คำตอบด้วยข้อความคำถาม แทนตำแหน่ง index — เพราะตอนนี้คำตอบถูกรวมเข้ามาทีละบท ไม่เรียงตามลำดับ course.quiz เสมอไป
        const relevantAnswers = quiz
            .map(qs => (qs.answers || []).find(a => a.question === q.question))
            .filter(Boolean);
        const lessonLabel = q.lessonIndex != null
            ? (course.lessons?.[q.lessonIndex]?.title ? `บทที่ ${q.lessonIndex+1}: ${course.lessons[q.lessonIndex].title}` : `บทที่ ${q.lessonIndex+1}`)
            : '📌 ทั้งคอร์ส';

        if (qType === 'short_answer') {
            const reviewedCount = relevantAnswers.filter(a => !a.needsReview).length;
            return `<div class="qbreak-item">
                <div class="qbreak-q">${qi+1}. ${q.question} <span style="color:var(--text-dim);font-weight:400;font-size:0.8rem;">(ตอบสั้น/เรียงความ)</span></div>
                <div style="font-size:0.76rem;color:var(--primary-blue);margin-bottom:4px;">${lessonLabel}</div>
                <div style="font-size:0.82rem;color:var(--text-dim);">ตรวจแล้ว ${reviewedCount}/${relevantAnswers.length} คน</div>
            </div>`;
        }

        const choiceCount = (q.choices || (qType==='true_false' ? ['ถูก','ผิด'] : [])).map((c, ci) => {
            const letter = labels[ci];
            let count = 0;
            relevantAnswers.forEach(a => {
                if (qType === 'checkbox') { if ((a.selectedMultiple||[]).includes(letter)) count++; }
                else { if (a.selected === letter) count++; }
            });
            return { letter, text: c, count };
        });
        const totalAnswered = relevantAnswers.length || 1;
        const correctCount = relevantAnswers.filter(a => a.isCorrect).length;
        const correctPct = Math.round((correctCount/totalAnswered)*100);

        return `<div class="qbreak-item">
            <div class="qbreak-q">${qi+1}. ${q.question} <span style="color:${correctPct>=60?'var(--success)':'var(--warning)'};font-weight:600;font-size:0.82rem;">(ถูก ${correctPct}%)</span></div>
            <div style="font-size:0.76rem;color:var(--primary-blue);margin-bottom:4px;">${lessonLabel}</div>
            ${choiceCount.map(c => {
                const pct = Math.round((c.count/totalAnswered)*100);
                const isCorrectChoice = qType==='checkbox' ? (q.correctMultiple||[]).includes(c.letter) : q.correct === c.letter;
                return `<div class="qbreak-choice-row">
                    <span class="qbreak-choice-label">${c.letter}</span>
                    <div class="qbreak-bar-track"><div class="qbreak-bar-fill${isCorrectChoice?' correct-fill':''}" style="width:${pct}%"></div></div>
                    <span class="qbreak-pct">${pct}%</span>
                </div>`;
            }).join('')}
        </div>`;
    }).join('');
}
function renderHwSummary(subs, courses) {
    const el = document.getElementById('hwSummary');
    const rows = courses.filter(c=>c.homework&&c.homework.length).map(c => {
        const cs      = subs.filter(s=>s.course_id===c.id);
        const graded  = cs.filter(s=>s.status==='graded').length;
        const pending = cs.filter(s=>s.status==='submitted').length;
        const avgScore= graded>0 ? Math.round(cs.filter(s=>s.status==='graded').reduce((a,s)=>a+(s.grade||0),0)/graded) : null;
        const title   = c.title.length>20 ? c.title.slice(0,20)+'…' : c.title;
        return `<div class="hw-row">
            <div><div class="hw-name">${title}</div><div class="hw-meta">${c.homework.length} งาน</div></div>
            <div class="hw-stats">
                <div class="hw-stat"><div class="hw-stat-val" style="color:var(--warning)">${pending}</div><div class="hw-stat-lbl">รอตรวจ</div></div>
                <div class="hw-stat"><div class="hw-stat-val" style="color:var(--success)">${graded}</div><div class="hw-stat-lbl">ตรวจแล้ว</div></div>
                <div class="hw-stat"><div class="hw-stat-val" style="color:#8b5cf6">${avgScore!==null?avgScore+'%':'—'}</div><div class="hw-stat-lbl">คะแนนเฉลี่ย</div></div>
            </div>
        </div>`;
    }).join('');
    el.innerHTML = rows || '<div style="color:var(--text-dim);font-size:0.85rem;padding:12px 0;">ยังไม่มีการบ้านในคอร์สที่เลือก</div>';
}

// ── Quiz Summary ──
function renderQuizSummary(quiz, courses) {
    const el = document.getElementById('quizSummary');
    if (!courses.length) { el.innerHTML = '<div style="color:var(--text-dim);">ไม่มีข้อมูล</div>'; return; }

    const rows = courses.map(c => {
        const cq  = quiz.filter(q=>q.course_id===c.id);
        const avg = cq.length ? Math.round(cq.reduce((s,q)=>s+(q.pct||0),0)/cq.length) : null;
        const cls = avg===null?'badge-yellow':avg>=75?'badge-green':avg>=40?'badge-yellow':'badge-red';
        const label = avg===null?'ยังไม่มีข้อมูล':avg>=75?`ดีมาก (${avg}%)`:avg>=40?`ควรทบทวน (${avg}%)`:`ต้องพัฒนา (${avg}%)`;
        const title = c.title.length>18 ? c.title.slice(0,18)+'…' : c.title;
        return `<div class="skill-row"><span>${title}</span><span class="skill-badge ${cls}">${label}</span></div>`;
    }).join('');
    el.innerHTML = rows;
}

// ── Bar Chart ──
function renderBarChart(enrolls, courses) {
    const ctx = document.getElementById('barChart');
    if (!ctx) return;
    if (barChart) barChart.destroy();

    const labels = courses.map(c => c.title.length>14?c.title.slice(0,14)+'…':c.title);
    const progData = courses.map(c => {
        const ce = enrolls.filter(e=>e.course_id===c.id);
        return ce.length ? Math.round(ce.reduce((s,e)=>s+(e.progress||0),0)/ce.length) : 0;
    });
    const watchData = courses.map(c => {
        const ce = enrolls.filter(e=>e.course_id===c.id);
        const totalSec = ce.reduce((s,e)=>s+(e.watch_seconds||0),0);
        return ce.length ? Math.round(totalSec/60/ce.length) : 0;
    });

    barChart = new Chart(ctx, {
        type:'bar',
        data:{
            labels,
            datasets:[
                { label:'Progress เฉลี่ย (%)', data:progData, backgroundColor:'rgba(139,92,246,0.7)', borderRadius:4, yAxisID:'y' },
                { label:'เวลาเรียนเฉลี่ย (นาที)', data:watchData, backgroundColor:'rgba(59,130,246,0.5)', borderRadius:4, yAxisID:'y1' }
            ]
        },
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{ labels:{ color:themeVar('--text-dim','#a0a0ba'), font:{ size:11 } } } },
            scales:{
                x:{ grid:{ display:false }, ticks:{ color:themeVar('--text-dim','#a0a0ba'), font:{ size:11 } } },
                y:{ position:'left', max:100, grid:{ color:themeVar('--line','rgba(255,255,255,0.05)') }, ticks:{ color:themeVar('--text-dim','#a0a0ba'), callback:v=>v+'%' } },
                y1:{ position:'right', grid:{ display:false }, ticks:{ color:themeVar('--text-dim','#a0a0ba'), callback:v=>v+' นาที' } }
            }
        }
    });
}

// ── AI Analysis ──
window.runAI = async function() {
    const { enrolls, subs, quiz, courses } = filtered();
    const el = document.getElementById('aiContent');
    if (!el) return;
    el.innerHTML = '<div class="ai-spinner"><div class="spinner-sm"></div><span>Groq LLaMA กำลังวิเคราะห์...</span></div>';

    const done    = enrolls.filter(e=>(e.progress||0)>=100).length;
    const avgProg = enrolls.length ? Math.round(enrolls.reduce((s,e)=>s+(e.progress||0),0)/enrolls.length) : 0;
    const avgQuiz = quiz.length ? Math.round(quiz.reduce((s,q)=>s+(q.pct||0),0)/quiz.length) : 0;
    const pending = subs.filter(s=>s.status==='submitted').length;

    const details = courses.map(c => {
        const ce = enrolls.filter(e=>e.course_id===c.id);
        const cq = quiz.filter(q=>q.course_id===c.id);
        return `"${c.title}": นักเรียน ${ce.length} คน, progress เฉลี่ย ${ce.length?Math.round(ce.reduce((s,e)=>s+(e.progress||0),0)/ce.length):0}%, quiz เฉลี่ย ${cq.length?Math.round(cq.reduce((s,q)=>s+(q.pct||0),0)/cq.length):0}%`;
    }).join('\n');

    const prompt = `คุณเป็น AI ช่วยวิเคราะห์ผลการสอนสำหรับครูบน SkillNest

ข้อมูลคอร์ส:
${details || 'ไม่มีข้อมูล'}

ภาพรวม: นักเรียน ${enrolls.length} คน | เรียนจบ ${done} คน | Progress เฉลี่ย ${avgProg}% | Quiz เฉลี่ย ${avgQuiz}% | การบ้านรอตรวจ ${pending} งาน

วิเคราะห์เป็นภาษาไทย แบ่งเป็น 3 ส่วน:
1. จุดแข็งของการสอน
2. จุดที่ควรปรับปรุง
3. คำแนะนำเชิงรุกสำหรับครั้งถัดไป

กระชับ ไม่เกิน 6-7 ประโยค ใช้ภาษาเป็นกันเอง`;

    try {
        const res = await fetch('/api/groq-analyze', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        const text = data.text || '';
        if (!text) throw new Error('no response');

        const lines = text.split('\n').filter(l=>l.trim());
        let html = '';
        lines.forEach(line => {
            const t = line.trim();
            if (t.match(/^[1-9]\.|จุดแข็ง|จุดที่ควร|คำแนะนำ/)) {
                html += `<div class="ai-section-head">${t}</div>`;
            } else if (t.startsWith('-') || t.startsWith('•')) {
                html += `<div style="padding-left:1rem;margin-bottom:2px;">→ ${t.replace(/^[-•]\s*/,'')}</div>`;
            } else if (t) {
                html += `<div style="margin-bottom:4px;">${t}</div>`;
            }
        });
        el.innerHTML = html;
    } catch(e) {
        el.innerHTML = `<span style="color:var(--text-dim);">วิเคราะห์ไม่ได้ในขณะนี้ <button onclick="runAI()" style="background:none;border:none;color:#8b5cf6;cursor:pointer;text-decoration:underline;">ลองใหม่</button></span>`;
    }
};
