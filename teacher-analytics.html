<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics ครู - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020418;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --text: #ffffff;
            --dim: #a0a0ba;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --nav: rgba(2,4,24,0.85);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; background:radial-gradient(circle at 20% 0%,#0d1547 0%,#020418 60%); }

        /* NAV */
        nav { position:fixed; top:0; left:0; right:0; height:64px; background:var(--nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 28px; z-index:100; }
        .nav-logo { font-weight:700; font-size:1.15rem; display:flex; align-items:center; gap:8px; }
        .nav-logo span { background:var(--blue); padding:3px 8px; border-radius:6px; font-size:0.85rem; }
        .nav-right { display:flex; align-items:center; gap:16px; }
        .nav-back { color:var(--dim); font-size:0.88rem; text-decoration:none; padding:6px 14px; border:1px solid var(--border); border-radius:8px; transition:all 0.2s; }
        .nav-back:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
        .nav-user { background:var(--blue); border:none; color:white; padding:7px 16px; border-radius:8px; font-size:0.88rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }

        /* LAYOUT */
        .page { padding:88px 28px 40px; max-width:1300px; margin:0 auto; }

        /* HEADER */
        .page-header { margin-bottom:32px; }
        .page-header h1 { font-size:1.7rem; font-weight:700; margin-bottom:6px; }
        .page-header p { color:var(--dim); font-size:0.92rem; }
        .page-header h1 span { color:var(--purple); }

        /* COURSE SELECTOR */
        .course-selector { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; }
        .course-tab { padding:8px 18px; border-radius:99px; border:1px solid var(--border); background:var(--card); color:var(--dim); font-size:0.85rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .course-tab:hover { border-color:var(--purple); color:var(--text); }
        .course-tab.active { background:rgba(139,92,246,0.2); border-color:var(--purple); color:var(--text); font-weight:600; }
        .course-tab.all-tab.active { background:rgba(59,130,246,0.2); border-color:var(--blue); }

        /* STAT CARDS */
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; transition:border-color 0.2s; }
        .stat-card:hover { border-color:rgba(255,255,255,0.15); }
        .stat-label { font-size:0.8rem; color:var(--dim); margin-bottom:8px; }
        .stat-value { font-size:2rem; font-weight:700; line-height:1; margin-bottom:4px; }
        .stat-sub { font-size:0.78rem; color:var(--dim); }
        .stat-card.blue .stat-value { color:var(--blue); }
        .stat-card.purple .stat-value { color:var(--purple); }
        .stat-card.green .stat-value { color:var(--green); }
        .stat-card.amber .stat-value { color:var(--amber); }

        /* GRID */
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:20px; }

        /* CARD */
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; }
        .card-title { font-size:0.92rem; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .card-title .badge { background:rgba(139,92,246,0.2); color:var(--purple); font-size:0.72rem; padding:2px 8px; border-radius:99px; font-weight:500; }

        /* CHART */
        .chart-wrap { position:relative; height:200px; }

        /* STUDENT TABLE */
        .student-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        .student-table th { color:var(--dim); font-weight:500; text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); }
        .student-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
        .student-table tr:last-child td { border-bottom:none; }
        .student-table tr:hover td { background:rgba(255,255,255,0.02); }
        .progress-pill { height:6px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; width:80px; }
        .progress-pill-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--purple),var(--blue)); }
        .status-badge { font-size:0.72rem; padding:3px 8px; border-radius:99px; font-weight:500; }
        .status-done { background:rgba(16,185,129,0.15); color:var(--green); }
        .status-progress { background:rgba(59,130,246,0.15); color:var(--blue); }
        .status-new { background:rgba(255,255,255,0.06); color:var(--dim); }

        /* AI SECTION */
        .ai-card { background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(59,130,246,0.08)); border:1px solid rgba(139,92,246,0.25); border-radius:16px; padding:22px; margin-bottom:20px; }
        .ai-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
        .ai-title { font-size:0.92rem; font-weight:600; display:flex; align-items:center; gap:8px; }
        .ai-badge { background:rgba(139,92,246,0.3); color:#c4b5fd; font-size:0.7rem; padding:2px 8px; border-radius:99px; }
        .btn-reanalyze { background:rgba(139,92,246,0.2); border:1px solid rgba(139,92,246,0.4); color:#c4b5fd; padding:5px 12px; border-radius:8px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
        .btn-reanalyze:hover { background:rgba(139,92,246,0.35); }
        .ai-content { font-size:0.88rem; line-height:1.8; color:#e2e8f0; }
        .ai-section-head { color:#c4b5fd; font-weight:600; margin-top:10px; margin-bottom:4px; }
        .ai-spinner { display:flex; align-items:center; gap:10px; color:var(--dim); }
        .spinner-sm { width:16px; height:16px; border:2px solid var(--purple); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* HOMEWORK SUMMARY */
        .hw-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
        .hw-row:last-child { border-bottom:none; }
        .hw-name { font-size:0.88rem; }
        .hw-meta { font-size:0.78rem; color:var(--dim); margin-top:2px; }
        .hw-stats { display:flex; gap:12px; font-size:0.8rem; }
        .hw-stat { text-align:center; }
        .hw-stat-val { font-weight:700; font-size:1rem; }
        .hw-stat-label { color:var(--dim); font-size:0.7rem; }

        /* COURSE CARD in selector */
        .course-overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-bottom:24px; }
        .course-mini-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:all 0.2s; }
        .course-mini-card:hover { border-color:rgba(139,92,246,0.4); transform:translateY(-2px); }
        .course-mini-card.selected { border-color:var(--purple); background:rgba(139,92,246,0.08); }
        .cmc-title { font-size:0.9rem; font-weight:600; margin-bottom:8px; }
        .cmc-stats { display:flex; gap:12px; }
        .cmc-stat { font-size:0.75rem; color:var(--dim); }
        .cmc-stat strong { color:var(--text); }

        /* LOADING */
        .page-loading { display:flex; align-items:center; justify-content:center; min-height:60vh; flex-direction:column; gap:16px; color:var(--dim); }
        .spinner-lg { width:36px; height:36px; border:3px solid rgba(139,92,246,0.3); border-top-color:var(--purple); border-radius:50%; animation:spin 0.9s linear infinite; }

        /* EMPTY */
        .empty-box { text-align:center; padding:48px 24px; color:var(--dim); }
        .empty-box h3 { color:var(--text); margin-bottom:8px; }

        @media(max-width:900px) {
            .stats-row { grid-template-columns:repeat(2,1fr); }
            .grid-2,.grid-3 { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <span>W</span> SkillNest
    </div>
    <div class="nav-right">
        <a href="dashboard.html" class="nav-back">← แดชบอร์ด</a>
        <button class="nav-user" id="navUser">👤 ครู</button>
    </div>
</nav>

<div class="page" id="pageContent">
    <div class="page-loading" id="pageLoading">
        <div class="spinner-lg"></div>
        <span>กำลังโหลดข้อมูล...</span>
    </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

let currentUser = null;
let allCourses = [];
let selectedCourseId = 'all';
let allEnrollments = [];
let allSubmissions = [];
let allQuizScores = [];
let barChart = null;
let pieChart = null;

// ============ INIT ============
async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = 'login-page/login.html'; return; }

    const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
    if (!profile || profile.user_type !== 'teacher') {
        window.location.href = 'dashboard.html'; return;
    }
    currentUser = user;
    document.getElementById('navUser').textContent = `👤 ${profile.first_name || 'ครู'}`;

    await fetchAllData();
    renderPage();
}

// ============ FETCH DATA ============
async function fetchAllData() {
    // คอร์สของครูคนนี้
    const { data: courses } = await supabase
        .from('courses')
        .select('*')
        .eq('creator_id', currentUser.id)
        .order('created_at', { ascending: false });
    allCourses = courses || [];

    if (allCourses.length === 0) return;

    const courseIds = allCourses.map(c => c.id);

    // enrollments ของทุกคอร์ส
    const { data: enrollments } = await supabase
        .from('enrollments')
        .select('*, users(first_name, last_name, email)')
        .in('course_id', courseIds);
    allEnrollments = enrollments || [];

    // submissions
    const { data: subs } = await supabase
        .from('submissions')
        .select('*')
        .in('course_id', courseIds);
    allSubmissions = subs || [];

    // quiz scores
    const { data: scores } = await supabase
        .from('quiz_scores')
        .select('*')
        .in('course_id', courseIds);
    allQuizScores = scores || [];
}

// ============ FILTER DATA ============
function getFiltered() {
    if (selectedCourseId === 'all') {
        return { enrollments: allEnrollments, submissions: allSubmissions, quizScores: allQuizScores, courses: allCourses };
    }
    return {
        enrollments: allEnrollments.filter(e => e.course_id === selectedCourseId),
        submissions: allSubmissions.filter(s => s.course_id === selectedCourseId),
        quizScores: allQuizScores.filter(q => q.course_id === selectedCourseId),
        courses: allCourses.filter(c => c.id === selectedCourseId)
    };
}

// ============ RENDER PAGE ============
function renderPage() {
    const container = document.getElementById('pageContent');
    if (allCourses.length === 0) {
        container.innerHTML = `
            <div class="page-header"><h1>📊 Analytics <span>ครู</span></h1><p>วิเคราะห์คอร์สที่คุณสร้าง</p></div>
            <div class="empty-box"><h3>ยังไม่มีคอร์ส</h3><p>สร้างคอร์สแรกของคุณก่อนนะครับ</p></div>`;
        return;
    }

    container.innerHTML = `
        <div class="page-header">
            <h1>📊 Analytics <span>ครู</span></h1>
            <p>วิเคราะห์เชิงลึกสำหรับคอร์สที่คุณสร้าง — อัปเดตจาก Supabase</p>
        </div>

        <!-- Course selector -->
        <div class="course-selector" id="courseSelector"></div>

        <!-- Stat cards -->
        <div class="stats-row" id="statsRow"></div>

        <!-- AI Analysis -->
        <div class="ai-card" id="aiSection">
            <div class="ai-header">
                <div class="ai-title">🤖 AI วิเคราะห์ภาพรวม <span class="ai-badge">Groq LLaMA</span></div>
                <button class="btn-reanalyze" onclick="runAI()">🔄 วิเคราะห์ใหม่</button>
            </div>
            <div class="ai-content" id="aiContent">
                <div class="ai-spinner"><div class="spinner-sm"></div><span>กำลังวิเคราะห์...</span></div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="grid-2" id="chartsRow">
            <div class="card">
                <div class="card-title">📈 Progress เฉลี่ยรายคอร์ส</div>
                <div class="chart-wrap"><canvas id="barChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">🥧 สัดส่วนสถานะนักเรียน</div>
                <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <!-- Student table + homework -->
        <div class="grid-2" id="tableSection">
            <div class="card">
                <div class="card-title">👥 รายชื่อนักเรียน <span class="badge" id="studentCount"></span></div>
                <div id="studentTableWrap"></div>
            </div>
            <div class="card">
                <div class="card-title">📋 สรุปการบ้าน</div>
                <div id="hwSummary"></div>
            </div>
        </div>

        <!-- Quiz scores -->
        <div class="card" style="margin-bottom:20px;">
            <div class="card-title">🎯 คะแนน Quiz รายคอร์ส</div>
            <div class="chart-wrap" style="height:160px;"><canvas id="quizChart"></canvas></div>
        </div>
    `;

    renderCourseSelector();
    updateAll();
}

// ============ COURSE SELECTOR ============
function renderCourseSelector() {
    const el = document.getElementById('courseSelector');
    let html = `<div class="course-tab all-tab ${selectedCourseId==='all'?'active':''}" onclick="selectCourse('all')">🌐 ทุกคอร์ส</div>`;
    allCourses.forEach(c => {
        html += `<div class="course-tab ${selectedCourseId===c.id?'active':''}" onclick="selectCourse('${c.id}')">${c.title}</div>`;
    });
    el.innerHTML = html;
}

window.selectCourse = function(id) {
    selectedCourseId = id;
    renderCourseSelector();
    updateAll();
    runAI();
};

// ============ UPDATE ALL SECTIONS ============
function updateAll() {
    const { enrollments, submissions, quizScores, courses } = getFiltered();
    renderStats(enrollments, submissions, quizScores, courses);
    renderCharts(enrollments, quizScores, courses);
    renderStudentTable(enrollments);
    renderHwSummary(submissions, courses);
    renderQuizChart(quizScores, courses);
}

// ============ STATS ============
function renderStats(enrollments, submissions, quizScores) {
    const done = enrollments.filter(e => (e.progress||0) >= 100).length;
    const avgProgress = enrollments.length
        ? Math.round(enrollments.reduce((s,e) => s+(e.progress||0),0)/enrollments.length)
        : 0;
    const avgQuiz = quizScores.length
        ? Math.round(quizScores.reduce((s,q)=>s+(q.pct||0),0)/quizScores.length)
        : 0;
    const pending = submissions.filter(s=>s.status==='submitted').length;

    document.getElementById('statsRow').innerHTML = `
        <div class="stat-card blue">
            <div class="stat-label">นักเรียนทั้งหมด</div>
            <div class="stat-value">${enrollments.length}</div>
            <div class="stat-sub">ลงทะเบียนอยู่</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">เรียนจบแล้ว</div>
            <div class="stat-value">${done}</div>
            <div class="stat-sub">progress 100%</div>
        </div>
        <div class="stat-card purple">
            <div class="stat-label">Progress เฉลี่ย</div>
            <div class="stat-value">${avgProgress}%</div>
            <div class="stat-sub">ทุกคอร์สรวมกัน</div>
        </div>
        <div class="stat-card amber">
            <div class="stat-label">การบ้านรอตรวจ</div>
            <div class="stat-value">${pending}</div>
            <div class="stat-sub"><a href="homework.html" style="color:var(--amber);text-decoration:none;">ไปตรวจ →</a></div>
        </div>
    `;
}

// ============ CHARTS ============
function renderCharts(enrollments, quizScores, courses) {
    // Bar: avg progress per course
    const labels = courses.map(c => c.title.length > 14 ? c.title.slice(0,14)+'…' : c.title);
    const progressData = courses.map(c => {
        const ce = enrollments.filter(e => e.course_id === c.id);
        return ce.length ? Math.round(ce.reduce((s,e)=>s+(e.progress||0),0)/ce.length) : 0;
    });

    const barCtx = document.getElementById('barChart');
    if (barChart) barChart.destroy();
    barChart = new Chart(barCtx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{ data: progressData, backgroundColor: 'rgba(139,92,246,0.7)', borderRadius: 6, borderSkipped: false }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#a0a0ba', font: { size: 11 } } },
                y: { max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0ba', callback: v => v+'%' } }
            }
        }
    });

    // Pie: done / in progress / new
    const done = enrollments.filter(e=>(e.progress||0)>=100).length;
    const inProg = enrollments.filter(e=>(e.progress||0)>0&&(e.progress||0)<100).length;
    const fresh = enrollments.filter(e=>(e.progress||0)===0).length;
    const pieCtx = document.getElementById('pieChart');
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(pieCtx, {
        type: 'doughnut',
        data: {
            labels: ['เรียนจบ','กำลังเรียน','ยังไม่เริ่ม'],
            datasets: [{ data: [done, inProg, fresh], backgroundColor: ['#10b981','#3b82f6','rgba(255,255,255,0.1)'], borderWidth: 0, hoverOffset: 6 }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { color: '#a0a0ba', font: { size: 11 }, padding: 16 } } },
            cutout: '65%'
        }
    });
}

// ============ STUDENT TABLE ============
function renderStudentTable(enrollments) {
    const el = document.getElementById('studentTableWrap');
    const countEl = document.getElementById('studentCount');
    countEl.textContent = enrollments.length + ' คน';

    if (enrollments.length === 0) {
        el.innerHTML = '<div class="empty-box" style="padding:24px;"><p>ยังไม่มีนักเรียน</p></div>';
        return;
    }

    const rows = enrollments.slice(0,10).map(e => {
        const u = e.users;
        const name = u ? `${u.first_name||''} ${u.last_name||''}`.trim() || u.email : e.user_id.slice(0,8)+'…';
        const pct = e.progress || 0;
        const courseName = allCourses.find(c=>c.id===e.course_id)?.title || e.course_id;
        const statusClass = pct>=100?'status-done':pct>0?'status-progress':'status-new';
        const statusText = pct>=100?'จบแล้ว':pct>0?'กำลังเรียน':'ยังไม่เริ่ม';
        return `<tr>
            <td>${name}</td>
            <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dim);font-size:0.78rem;">${selectedCourseId==='all'?courseName:''}</td>
            <td>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-pill"><div class="progress-pill-fill" style="width:${pct}%"></div></div>
                    <span style="font-size:0.78rem;color:var(--dim);">${pct}%</span>
                </div>
            </td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        </tr>`;
    }).join('');

    el.innerHTML = `<div style="overflow-x:auto;">
        <table class="student-table">
            <thead><tr>
                <th>ชื่อ</th>
                ${selectedCourseId==='all'?'<th>คอร์ส</th>':''}
                <th>Progress</th>
                <th>สถานะ</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>
        ${enrollments.length>10?`<p style="text-align:center;color:var(--dim);font-size:0.78rem;padding:10px 0;">และอีก ${enrollments.length-10} คน</p>`:''}
    </div>`;
}

// ============ HOMEWORK SUMMARY ============
function renderHwSummary(submissions, courses) {
    const el = document.getElementById('hwSummary');
    if (courses.length === 0) { el.innerHTML = '<div style="color:var(--dim);font-size:0.85rem;">ไม่มีข้อมูล</div>'; return; }

    let html = '';
    courses.forEach(c => {
        if (!c.homework || c.homework.length === 0) return;
        const courseSubs = submissions.filter(s => s.course_id === c.id);
        const graded = courseSubs.filter(s=>s.status==='graded').length;
        const pending = courseSubs.filter(s=>s.status==='submitted').length;
        const avgScore = graded > 0
            ? Math.round(courseSubs.filter(s=>s.status==='graded').reduce((sum,s)=>sum+(s.grade||0),0)/graded)
            : null;
        html += `<div class="hw-row">
            <div>
                <div class="hw-name">${c.title.length>22?c.title.slice(0,22)+'…':c.title}</div>
                <div class="hw-meta">${c.homework.length} งาน</div>
            </div>
            <div class="hw-stats">
                <div class="hw-stat"><div class="hw-stat-val" style="color:var(--amber)">${pending}</div><div class="hw-stat-label">รอตรวจ</div></div>
                <div class="hw-stat"><div class="hw-stat-val" style="color:var(--green)">${graded}</div><div class="hw-stat-label">ตรวจแล้ว</div></div>
                <div class="hw-stat"><div class="hw-stat-val" style="color:var(--purple)">${avgScore !== null ? avgScore+'%' : '—'}</div><div class="hw-stat-label">คะแนนเฉลี่ย</div></div>
            </div>
        </div>`;
    });
    el.innerHTML = html || '<div style="color:var(--dim);font-size:0.85rem;padding:12px 0;">ยังไม่มีการบ้านในคอร์สที่เลือก</div>';
}

// ============ QUIZ CHART ============
function renderQuizChart(quizScores, courses) {
    const labels = courses.map(c => c.title.length > 14 ? c.title.slice(0,14)+'…' : c.title);
    const avgData = courses.map(c => {
        const qs = quizScores.filter(q=>q.course_id===c.id);
        return qs.length ? Math.round(qs.reduce((s,q)=>s+(q.pct||0),0)/qs.length) : 0;
    });
    const countData = courses.map(c => quizScores.filter(q=>q.course_id===c.id).length);

    const ctx = document.getElementById('quizChart');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: 'คะแนนเฉลี่ย (%)', data: avgData, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4, yAxisID: 'y' },
                { label: 'จำนวนคนทำ', data: countData, backgroundColor: 'rgba(16,185,129,0.5)', borderRadius: 4, yAxisID: 'y1' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#a0a0ba', font: { size: 11 } } } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#a0a0ba', font: { size: 11 } } },
                y: { position: 'left', max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0ba', callback: v => v+'%' } },
                y1: { position: 'right', grid: { display: false }, ticks: { color: '#a0a0ba' } }
            }
        }
    });
}

// ============ AI ANALYSIS ============
window.runAI = async function() {
    const { enrollments, submissions, quizScores, courses } = getFiltered();
    const aiEl = document.getElementById('aiContent');
    aiEl.innerHTML = '<div class="ai-spinner"><div class="spinner-sm"></div><span>Groq LLaMA กำลังวิเคราะห์...</span></div>';

    const done = enrollments.filter(e=>(e.progress||0)>=100).length;
    const avgProgress = enrollments.length
        ? Math.round(enrollments.reduce((s,e)=>s+(e.progress||0),0)/enrollments.length) : 0;
    const avgQuiz = quizScores.length
        ? Math.round(quizScores.reduce((s,q)=>s+(q.pct||0),0)/quizScores.length) : 0;
    const pendingHw = submissions.filter(s=>s.status==='submitted').length;

    const courseDetails = courses.map(c => {
        const ce = enrollments.filter(e=>e.course_id===c.id);
        const cq = quizScores.filter(q=>q.course_id===c.id);
        const cs = submissions.filter(s=>s.course_id===c.id);
        return `คอร์ส "${c.title}": นักเรียน ${ce.length} คน, progress เฉลี่ย ${ce.length?Math.round(ce.reduce((s,e)=>s+(e.progress||0),0)/ce.length):0}%, คะแนน quiz เฉลี่ย ${cq.length?Math.round(cq.reduce((s,q)=>s+(q.pct||0),0)/cq.length):0}%, การบ้านส่งมา ${cs.length} ชิ้น`;
    }).join('\n');

    const prompt = `คุณเป็น AI ที่ช่วยวิเคราะห์ผลการสอนสำหรับครูบนแพลตฟอร์ม SkillNest

ข้อมูลคอร์สที่ครูสร้าง:
${courseDetails}

ภาพรวม:
- นักเรียนทั้งหมด: ${enrollments.length} คน
- เรียนจบแล้ว: ${done} คน
- Progress เฉลี่ย: ${avgProgress}%
- คะแนน Quiz เฉลี่ย: ${avgQuiz}%
- การบ้านรอตรวจ: ${pendingHw} ชิ้น

กรุณาวิเคราะห์เป็นภาษาไทย แบ่งเป็น 3 ส่วน:
1. จุดแข็งของการสอน (สิ่งที่ทำได้ดี)
2. จุดที่ควรปรับปรุง (เช่น คอร์สไหนนักเรียน drop off มาก)
3. คำแนะนำเชิงรุก (ควรทำอะไรต่อไป)

ตอบกระชับ ตรงประเด็น ใช้ภาษาเป็นกันเอง ไม่เกิน 6-7 ประโยค`;

    try {
        const res = await fetch('/api/groq-analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        const text = data.text || '';
        if (!text) throw new Error('no response');

        const lines = text.split('\n').filter(l => l.trim());
        let html = '';
        lines.forEach(line => {
            const t = line.trim();
            if (t.match(/^[1-9]\.|จุดแข็ง|จุดที่ควร|คำแนะนำ/)) {
                html += `<div class="ai-section-head">${t}</div>`;
            } else if (t.startsWith('-') || t.startsWith('•')) {
                html += `<div style="padding-left:1rem;margin-bottom:2px;">→ ${t.replace(/^[-•]\s*/,'')}</div>`;
            } else if (t) {
                html += `<div style="margin-bottom:4px;">${t}</div>`;
            }
        });
        aiEl.innerHTML = html;
    } catch(e) {
        aiEl.innerHTML = `<span style="color:var(--dim);">วิเคราะห์ไม่ได้ในขณะนี้ <button onclick="runAI()" style="background:none;border:none;color:var(--purple);cursor:pointer;text-decoration:underline;">ลองใหม่</button></span>`;
    }
};

document.getElementById('pageLoading').style.display = 'flex';
init().then(() => {
