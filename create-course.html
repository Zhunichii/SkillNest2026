<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างคอร์สใหม่ - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020418;
            --primary-blue: #3b82f6;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --text-main: #ffffff;
            --text-dim: #a0a0ba;
            --card-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a1a4d 0%, #020418 60%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            font-weight: 700;
        }

        .logo span {
            color: var(--primary-blue);
        }

        .section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .required {
            color: var(--danger-red);
        }

        .form-group small {
            display: block;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            background: var(--input-bg);
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-area:hover {
            border-color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .file-upload-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--input-bg);
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .file-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }

        .lesson-item {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .lesson-number {
            background: var(--primary-blue);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-success {
            background: var(--success-green);
            color: white;
        }

        .btn-danger {
            background: var(--danger-red);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        .upload-method {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .method-option {
            flex: 1;
            padding: 1rem;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .method-option:hover {
            border-color: var(--primary-blue);
        }

        .method-option.active {
            border-color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .method-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-container {
            margin-top: 1.5rem;
            display: none;
        }

        .progress-item {
            background: var(--input-bg);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-blue);
            transition: width 0.3s;
        }

        .btn-back {
            color: var(--text-dim);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            transition: 0.2s;
        }

        .btn-back:hover {
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="btn-back">← กลับหน้าหลัก</a>

    <div class="header">
        <h1 class="logo">Skill<span>Nest</span> 📚</h1>
        <p style="color: var(--text-dim);">สร้างคอร์สของคุณ</p>
    </div>

    <!-- Section 1: ข้อมูลคอร์ส -->
    <div class="section">
        <h2 class="section-title">📝 ข้อมูลคอร์ส</h2>
        
        <div class="form-group">
            <label>ชื่อคอร์ส <span class="required">*</span></label>
            <input type="text" id="courseTitle" class="form-control" placeholder="เช่น Python สำหรับผู้เริ่มต้น">
        </div>

        <div class="form-group">
            <label>คำอธิบายคอร์ส <span class="required">*</span></label>
            <textarea id="courseDescription" class="form-control" placeholder="อธิบายสิ่งที่ผู้เรียนจะได้เรียนรู้..."></textarea>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>หมวดหมู่ <span class="required">*</span></label>
                <select id="courseCategory" class="form-control">
                    <option value="">-- เลือกหมวดหมู่ --</option>
                    <option value="programming">การเขียนโปรแกรม</option>
                    <option value="design">ดิไซน์</option>
                    <option value="business">ธุรกิจ</option>
                    <option value="marketing">การตลาด</option>
                    <option value="data-science">วิทยาศาสตร์ข้อมูล</option>
                    <option value="other">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label>ระดับความยาก <span class="required">*</span></label>
                <select id="courseLevel" class="form-control">
                    <option value="">-- เลือกระดับ --</option>
                    <option value="beginner">เริ่มต้น</option>
                    <option value="intermediate">ปานกลาง</option>
                    <option value="advanced">สูง</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>ชื่อผู้สอน</label>
            <input type="text" id="courseInstructor" class="form-control" placeholder="ชื่อของคุณ (ถ้ามี)">
        </div>
    </div>

    <!-- Section 2: รูปปก -->
    <div class="section">
        <h2 class="section-title">🖼️ รูปปกคอร์ส</h2>
        
        <div class="file-upload-area" onclick="document.getElementById('thumbnailInput').click()">
            <div class="file-upload-icon">📷</div>
            <p>คลิกเพื่ออัพโหลดรูปปก</p>
            <small style="color: var(--text-dim);">รองรับ JPG, PNG, WEBP (แนะนำ 16:9)</small>
        </div>
        <input type="file" id="thumbnailInput" accept="image/*" style="display:none;">
        <div id="thumbnailPreview"></div>
    </div>

    <!-- Section 3: บทเรียน -->
    <div class="section">
        <h2 class="section-title">📚 บทเรียน</h2>
        
        <div id="lessonsList"></div>
        
        <button class="btn btn-primary" onclick="addLesson()">+ เพิ่มบทเรียน</button>
    </div>

    <!-- Submit -->
    <div style="text-align: center; margin-top: 2rem;">
        <button class="btn btn-success" onclick="createCourse()" style="font-size: 1.1rem; padding: 1rem 3rem;">
            ✅ สร้างคอร์ส
        </button>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <div class="spinner"></div>
        <h3 id="loadingText">กำลังประมวลผล...</h3>
        <div id="progressContainer" class="progress-container"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyBDvhHzbh8KV4hh_owDABrP1itijZ6fNaw",
    authDomain: "skillnest-2026.firebaseapp.com",
    projectId: "skillnest-2026",
    storageBucket: "skillnest-2026.firebasestorage.app",
    messagingSenderId: "416822065212",
    appId: "1:416822065212:web:f7d9356073bacbf5f9ab39"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Cloudinary Config
const CLOUDINARY_CLOUD_NAME = 'dtuwwmmO';
const CLOUDINARY_UPLOAD_PRESET = 'skillnest_uploads';

// Global State
let thumbnailFile = null;
let thumbnailUrl = '';
let lessons = [];
let lessonCounter = 0;
let currentUser = null;

// ตรวจสอบ Login และสิทธิ์
onAuthStateChanged(auth, async (user) => {
    if (user) {
        try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                const userType = userData.userType || 'student';
                
                if (userType !== 'teacher') {
                    alert('คุณไม่มีสิทธิ์สร้างคอร์ส เฉพาะครูเท่านั้น');
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                currentUser = user;
            }
        } catch (error) {
            console.error('Error checking permissions:', error);
            alert('เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์');
            window.location.href = 'dashboard.html';
        }
    } else {
        window.location.href = '../login-page/login.html';
    }
});

// === Thumbnail Upload ===
document.getElementById('thumbnailInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
        thumbnailFile = file;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('thumbnailPreview').innerHTML = `
                <div class="file-preview">
                    <img src="${event.target.result}" alt="Thumbnail">
                    <div style="flex:1;">
                        <strong>${file.name}</strong><br>
                        <small>${(file.size / 1024).toFixed(1)} KB</small>
                    </div>
                    <button class="btn btn-danger" onclick="removeThumbnail()">✕</button>
                </div>
            `;
        };
        reader.readAsDataURL(file);
    }
});

window.removeThumbnail = function() {
    thumbnailFile = null;
    document.getElementById('thumbnailInput').value = '';
    document.getElementById('thumbnailPreview').innerHTML = '';
};

// === Add Lesson ===
window.addLesson = function() {
    lessonCounter++;
    const lessonId = 'lesson-' + lessonCounter;
    
    lessons.push({ id: lessonId, method: 'file', file: null });
    
    const lessonHTML = `
        <div class="lesson-item" id="${lessonId}">
            <div class="lesson-header">
                <span class="lesson-number">บทที่ ${lessonCounter}</span>
                <button class="btn btn-danger" onclick="removeLesson('${lessonId}')">ลบบทเรียน</button>
            </div>
            
            <div class="form-group">
                <label>ชื่อบทเรียน <span class="required">*</span></label>
                <input type="text" class="form-control lesson-title" placeholder="เช่น ติดตั้ง Python">
            </div>
            
            <div class="form-group">
                <label>ระยะเวลา (นาที)</label>
                <input type="number" class="form-control lesson-duration" placeholder="เช่น 15">
            </div>
            
            <div class="form-group">
                <label>เลือกวิธีอัพโหลด</label>
                <div class="upload-method">
                    <div class="method-option active" onclick="selectMethod('${lessonId}', 'file')">
                        <div class="method-icon">📁</div>
                        <div>อัพโหลดไฟล์</div>
                    </div>
                    <div class="method-option" onclick="selectMethod('${lessonId}', 'youtube')">
                        <div class="method-icon">▶️</div>
                        <div>YouTube URL</div>
                    </div>
                </div>
            </div>
            
            <div id="uploadArea-${lessonId}">
                <div class="file-upload-area" onclick="document.getElementById('lessonFileInput-${lessonId}').click()">
                    <div class="file-upload-icon">📤</div>
                    <p>คลิกเพื่ออัพโหลดไฟล์</p>
                    <small style="color: var(--text-dim);">รองรับ PDF, PPT, DOC, รูปภาพ</small>
                </div>
                <input type="file" id="lessonFileInput-${lessonId}" style="display:none;">
                <div id="lessonFilePreview-${lessonId}"></div>
            </div>
            
            <div id="youtubeArea-${lessonId}" style="display:none;">
                <input type="text" class="form-control lesson-youtube-url" placeholder="วาง YouTube URL ที่นี่">
            </div>
        </div>
    `;
    
    document.getElementById('lessonsList').insertAdjacentHTML('beforeend', lessonHTML);
    
    // Event listener for file input
    document.getElementById(`lessonFileInput-${lessonId}`).addEventListener('change', function(e) {
        handleLessonFileUpload(lessonId, e.target.files[0]);
    });
};

window.selectMethod = function(lessonId, method) {
    const lessonData = lessons.find(l => l.id === lessonId);
    if (lessonData) lessonData.method = method;
    
    const lessonItem = document.getElementById(lessonId);
    lessonItem.querySelectorAll('.method-option').forEach(opt => opt.classList.remove('active'));
    
    if (method === 'file') {
        lessonItem.querySelectorAll('.method-option')[0].classList.add('active');
        document.getElementById(`uploadArea-${lessonId}`).style.display = 'block';
        document.getElementById(`youtubeArea-${lessonId}`).style.display = 'none';
    } else {
        lessonItem.querySelectorAll('.method-option')[1].classList.add('active');
        document.getElementById(`uploadArea-${lessonId}`).style.display = 'none';
        document.getElementById(`youtubeArea-${lessonId}`).style.display = 'block';
    }
};

function handleLessonFileUpload(lessonId, file) {
    if (!file) return;
    
    const lessonData = lessons.find(l => l.id === lessonId);
    if (lessonData) lessonData.file = file;
    
    const icon = getFileIcon(file.name);
    document.getElementById(`lessonFilePreview-${lessonId}`).innerHTML = `
        <div class="file-preview">
            <div style="font-size:2rem;">${icon}</div>
            <div style="flex:1;">
                <strong>${file.name}</strong><br>
                <small>${(file.size / 1024).toFixed(1)} KB</small>
            </div>
            <button class="btn btn-danger" onclick="removeLessonFile('${lessonId}')">✕</button>
        </div>
    `;
}

window.removeLessonFile = function(lessonId) {
    const lessonData = lessons.find(l => l.id === lessonId);
    if (lessonData) lessonData.file = null;
    
    document.getElementById(`lessonFileInput-${lessonId}`).value = '';
    document.getElementById(`lessonFilePreview-${lessonId}`).innerHTML = '';
};

window.removeLesson = function(lessonId) {
    document.getElementById(lessonId).remove();
    lessons = lessons.filter(l => l.id !== lessonId);
};

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const icons = {
        'pdf': '📄',
        'ppt': '📊', 'pptx': '📊',
        'doc': '📝', 'docx': '📝',
        'xls': '📈', 'xlsx': '📈',
        'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️'
    };
    return icons[ext] || '📎';
}

function detectFileType(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    if (ext === 'pdf') return 'pdf';
    if (['ppt', 'pptx'].includes(ext)) return 'ppt';
    if (['doc', 'docx'].includes(ext)) return 'doc';
    if (['xls', 'xlsx'].includes(ext)) return 'excel';
    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return 'image';
    return 'unknown';
}

// === Show/Hide Loading ===
function showLoading(text) {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.add('show');
}

function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
}

function updateProgress(items) {
    const container = document.getElementById('progressContainer');
    container.style.display = 'block';
    container.innerHTML = items.map(item => `
        <div class="progress-item">
            <div style="display:flex; justify-content:space-between; margin-bottom:0.25rem;">
                <span>${item.name}</span>
                <span>${item.status}</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${item.progress}%"></div>
            </div>
        </div>
    `).join('');
}

// === Upload to Cloudinary ===
async function uploadToCloudinary(file, folder = 'skillnest') {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    formData.append('folder', folder);

    // ตรวจสอบประเภทไฟล์
    const fileType = detectFileType(file.name);
    let resourceType = 'auto';
    
    if (file.type.startsWith('image/')) {
        resourceType = 'image';
    } else if (file.type.startsWith('video/')) {
        resourceType = 'video';
    } else {
        resourceType = 'raw'; // สำหรับ PDF, documents
    }

    const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`,
        {
            method: 'POST',
            body: formData
        }
    );

    if (!response.ok) throw new Error('Cloudinary upload failed');
    
    const data = await response.json();
    return data.secure_url;
}

// === Create Course ===
window.createCourse = async function() {
    // ตรวจสอบว่า login แล้วหรือยัง
    if (!currentUser) {
        alert('❌ กรุณา login ก่อนสร้างคอร์ส');
        window.location.href = '../login-page/login.html';
        return;
    }

    // Validate
    const title = document.getElementById('courseTitle').value.trim();
    const description = document.getElementById('courseDescription').value.trim();
    const category = document.getElementById('courseCategory').value;
    const level = document.getElementById('courseLevel').value;
    const instructor = document.getElementById('courseInstructor').value.trim();

    if (!title || !description || !category || !level) {
        alert('❌ กรุณากรอกข้อมูลคอร์สให้ครบถ้วน');
        return;
    }

    if (lessons.length === 0) {
        alert('❌ กรุณาเพิ่มบทเรียนอย่างน้อย 1 บทเรียน');
        return;
    }

    try {
        showLoading('กำลังเตรียมข้อมูล...');
        const progress = [];

        // 1. Upload thumbnail to Cloudinary
        if (thumbnailFile) {
            progress.push({ name: 'รูปปกคอร์ส', status: 'กำลังอัพโหลด...', progress: 0 });
            updateProgress(progress);
            
            thumbnailUrl = await uploadToCloudinary(thumbnailFile, 'skillnest/thumbnails');
            
            progress[0].status = '✅ สำเร็จ';
            progress[0].progress = 100;
            updateProgress(progress);
        }

        // 2. Upload lesson files to Cloudinary
        const lessonsData = [];
        
        for (let i = 0; i < lessons.length; i++) {
            const lessonItem = document.getElementById(lessons[i].id);
            const lessonTitle = lessonItem.querySelector('.lesson-title').value.trim();
            const lessonDuration = lessonItem.querySelector('.lesson-duration').value.trim();
            
            if (!lessonTitle) {
                alert(`❌ กรุณากรอกชื่อบทเรียนที่ ${i + 1}`);
                hideLoading();
                return;
            }

            const lessonData = lessons[i];
            let fileUrl = '';
            let fileType = '';

            progress.push({ name: `บทที่ ${i + 1}: ${lessonTitle}`, status: 'กำลังประมวลผล...', progress: 0 });
            updateProgress(progress);

            if (lessonData.method === 'file') {
                if (!lessonData.file) {
                    alert(`❌ กรุณาเลือกไฟล์สำหรับบทเรียนที่ ${i + 1}`);
                    hideLoading();
                    return;
                }

                // Upload to Cloudinary
                fileUrl = await uploadToCloudinary(lessonData.file, 'skillnest/lessons');
                fileType = detectFileType(lessonData.file.name);

                progress[i + (thumbnailFile ? 1 : 0)].status = '✅ อัพโหลดแล้ว';
                progress[i + (thumbnailFile ? 1 : 0)].progress = 100;

            } else if (lessonData.method === 'youtube') {
                fileUrl = lessonItem.querySelector('.lesson-youtube-url').value.trim();
                
                if (!fileUrl) {
                    alert(`❌ กรุณาใส่ YouTube URL สำหรับบทเรียนที่ ${i + 1}`);
                    hideLoading();
                    return;
                }

                fileType = 'youtube';
                progress[i + (thumbnailFile ? 1 : 0)].status = '✅ บันทึก URL';
                progress[i + (thumbnailFile ? 1 : 0)].progress = 100;
            }

            updateProgress(progress);

            lessonsData.push({
                title: lessonTitle,
                fileUrl: fileUrl,
                type: fileType,
                duration: lessonDuration ? parseInt(lessonDuration) : null,
                order: i
            });
        }

        // 3. บันทึกข้อมูลลง Firestore
        showLoading('กำลังบันทึกข้อมูลคอร์ส...');
        
        const courseData = {
            title: title,
            description: description,
            category: category,
            level: level,
            instructor: instructor || 'ไม่ระบุ',
            thumbnail: thumbnailUrl || '',
            enrolledCount: 0,
            createdAt: serverTimestamp(),
            creatorId: currentUser.uid,
            creatorEmail: currentUser.email,
            lessons: lessonsData
        };

        const docRef = await addDoc(collection(db, 'courses'), courseData);

        hideLoading();
        
        alert('🎉 สร้างคอร์สสำเร็จ!\n\nCourse ID: ' + docRef.id);
        
        // Redirect
        if (confirm('ต้องการกลับไปหน้า Dashboard หรือไม่?')) {
            window.location.href = 'dashboard.html';
        } else {
            location.reload();
        }

    } catch (error) {
        hideLoading();
        console.error('Error:', error);
        alert('❌ เกิดข้อผิดพลาด: ' + error.message);
    }
};

</script>

</body>
</html>
