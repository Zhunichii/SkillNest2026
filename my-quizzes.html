<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฝึกหัดของฉัน - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo-icon {
            background: var(--primary-blue);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .nav-title {
            flex: 1;
            font-size: 1rem;
            color: var(--text-dim);
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            position: fixed;
            left: 0; top: 70px;
            width: 250px;
            height: calc(100vh - 70px);
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-main);
        }

        .main-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 40px;
            width: calc(100% - 250px);
        }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-dim); }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .quiz-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .quiz-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
        }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .quiz-course-name { font-size: 1rem; font-weight: 600; flex: 1; }

        .quiz-count-badge {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .quiz-meta { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.25rem; }

        .quiz-score-bar {
            background: var(--card-hover);
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }

        .quiz-score-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--purple), var(--primary-blue));
            transition: width 0.5s ease;
        }

        .quiz-score-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* ── ปุ่มสองปุ่มล่างการ์ด ── */
        .quiz-card-actions {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
            align-items: stretch;   /* ← ทำให้สูงเท่ากันทั้งคู่ */
        }

        .btn-start-quiz {
            flex: 1;
            /* ไม่กำหนด height แบบ fixed → ยืดตาม container */
            padding: 0 0.75rem;
            min-height: 48px;       /* ← ความสูงขั้นต่ำ แทน height คงที่ */
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-start-quiz:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-go-lesson {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            /* ไม่มี height → stretch จาก parent ทำให้สูงเท่า btn-start-quiz */
        }

        .btn-go-lesson:hover {
            background: var(--card-hover);
            border-color: var(--border-focus);
            color: var(--text-main);
        }

        /* === Modal === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.show { display: flex; }

        .quiz-modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
        }

        .quiz-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .quiz-progress-info { font-size: 0.9rem; color: var(--text-dim); }

        .btn-close-modal {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .quiz-modal-progress-bar {
            height: 6px;
            background: var(--card-hover);
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .quiz-modal-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--primary-blue));
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.6; }

        .choice-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-option:hover { border-color: var(--purple); background: rgba(139,92,246,0.08); }
        .choice-option.selected { border-color: var(--primary-blue); background: rgba(59,130,246,0.12); }
        .choice-option.correct { border-color: var(--success-green) !important; background: rgba(16,185,129,0.12) !important; }
        .choice-option.wrong   { border-color: var(--danger-red) !important;    background: rgba(239,68,68,0.12) !important; }

        .choice-letter {
            background: var(--card-hover);
            border-radius: 8px;
            padding: 0.3rem 0.65rem;
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 36px;
            text-align: center;
        }

        .btn-next {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-next:not(:disabled):hover { background: #2563eb; }

        /* === Result === */
        .result-screen { text-align: center; padding: 1rem 0; }
        .result-emoji  { font-size: 4.5rem; margin-bottom: 1rem; }
        .result-score  { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .result-sub    { color: var(--text-dim); margin-bottom: 2rem; }

        .result-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .result-stat { background: var(--card-bg); border-radius: 12px; padding: 1rem; }
        .result-stat-num   { font-size: 1.6rem; font-weight: 700; }
        .result-stat-label { font-size: 0.8rem; color: var(--text-dim); }

        .btn-retry {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 0.75rem;
        }

        .btn-close-result {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.9rem 2.5rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* === Empty / Loading === */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
        .empty-icon  { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h3 { color: var(--text-main); font-size: 1.3rem; margin-bottom: 0.5rem; }

        .loading-spinner { display: flex; justify-content: center; padding: 60px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-item span { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app-container">

    <nav class="top-nav">
        <a href="dashboard.html" class="logo-section">
            <span class="logo-icon">W</span>
            <span>SkillNest</span>
        </a>
        <span class="nav-title">📝 แบบฝึกหัดของฉัน</span>
    </nav>

    <aside class="sidebar">
        <div class="sidebar-item" onclick="window.location.href='dashboard.html?page=explore'">🔍 <span>ค้นหาคอร์สใหม่</span></div>
        <div class="sidebar-item" onclick="window.location.href='dashboard.html?page=my-courses'">📚 <span>คอร์สของฉัน</span></div>
        <div class="sidebar-item teacher-only" id="sidebarCreateCourse" onclick="window.location.href='create-course.html'" style="display:none;">💡 <span>เพิ่มคอร์ส</span></div>
        <div class="sidebar-item teacher-only" id="sidebarHomework" onclick="window.location.href='homework.html'" style="display:none;">📋 <span>ตรวจการบ้าน</span></div>
        <div class="sidebar-item active" id="sidebarMyQuizzes" onclick="window.location.href='my-quizzes.html'">📝 <span>แบบฝึกหัดของฉัน</span></div>
        <div class="sidebar-item" onclick="window.location.href='learning.html'">📊 <span>ผลการเรียนรู้</span></div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>📝 แบบฝึกหัดของฉัน</h1>
            <p>ทำแบบทดสอบเพื่อทดสอบความเข้าใจจากคอร์สที่คุณลงทะเบียน</p>
        </div>

        <div id="quizGrid" class="quiz-grid">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </main>
</div>

<!-- Quiz Modal -->
<div id="quizModalOverlay" class="modal-overlay">
    <div class="quiz-modal" id="quizModal"></div>
</div>

<script type="module">
import { supabase } from './supabase.js';

let currentUser = null;
let allCourses = [];   // คอร์สที่ลงทะเบียน + มี quiz/homework

// ── Init ──
(async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { window.location.href = '../login-page/login.html'; return; }
    currentUser = user;

    // แสดง sidebar ตาม role
    try {
        const { data: userDoc } = await supabase.from('users').select('user_type').eq('id', user.id).single();
        if (userDoc?.user_type === 'teacher') {
            document.querySelectorAll('.teacher-only').forEach(el => el.style.display = 'flex');
        }
    } catch(e) {}

    loadQuizzes();
})();

async function loadQuizzes() {
    const grid = document.getElementById('quizGrid');
    try {
        // 1. คอร์สที่ลงทะเบียน
        const { data: enrollments } = await supabase
            .from('enrollments').select('course_id').eq('user_id', currentUser.id);
        const enrolledIds = (enrollments || []).map(e => e.course_id);

        if (enrolledIds.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📭</div><h3>ยังไม่ได้สมัครเรียนคอร์สใด</h3><p>กลับไปที่ <a href="dashboard.html" style="color:var(--primary-blue);">หน้าหลัก</a> เพื่อสมัครเรียนคอร์สที่สนใจ</p></div>`;
            return;
        }

        // 2. ดึงเฉพาะคอร์สที่ลงทะเบียน
        const { data: courses } = await supabase
            .from('courses').select('*').in('id', enrolledIds);

        // 3. คะแนน quiz + การส่งการบ้านของนักเรียนคนนี้
        const { data: quizScores } = await supabase
            .from('quiz_scores').select('*').eq('user_id', currentUser.id);
        const { data: submissions } = await supabase
            .from('submissions').select('*').eq('user_id', currentUser.id);

        const scoresMap = {};
        (quizScores || []).forEach(s => { scoresMap[s.course_id] = s; });
        window.__completedQuiz = scoresMap;
        const subMap = {};
        (submissions || []).forEach(s => { subMap[`${s.course_id}_${s.homework_index}`] = s; });

        // 4. เก็บเฉพาะคอร์สที่มี quiz หรือ homework
        allCourses = (courses || []).filter(c => {
            const hasQuiz = Array.isArray(c.quiz) && c.quiz.length > 0;
            const hasHw   = Array.isArray(c.homework) && c.homework.length > 0;
            return hasQuiz || hasHw;
        });

        if (allCourses.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📭</div><h3>ยังไม่มีแบบฝึกหัด</h3><p>คอร์สที่คุณสมัครยังไม่มีแบบทดสอบหรือการบ้านในตอนนี้</p></div>`;
            return;
        }

        // 5. render การ์ด
        grid.innerHTML = '';
        allCourses.forEach(course => {
            const quizArr = Array.isArray(course.quiz) ? course.quiz : [];
            const hwArr   = Array.isArray(course.homework) ? course.homework : [];
            const quizCount = quizArr.length;
            const scoreData = scoresMap[course.id];
            const hasScore  = !!scoreData;
            const pct = hasScore ? scoreData.pct : 0;

            // นับการบ้านที่ส่งแล้ว
            let hwDone = 0;
            hwArr.forEach((hw, hi) => { if (subMap[`${course.id}_${hi}`]) hwDone++; });

            // ส่วน quiz ในการ์ด
            let quizSection = '';
            if (quizCount > 0) {
                quizSection = `
                    <div class="quiz-meta">📋 แบบทดสอบ ${quizCount} ข้อ</div>
                    ${hasScore ? `
                        <div class="quiz-score-bar"><div class="quiz-score-fill" style="width:${pct}%"></div></div>
                        <div class="quiz-score-label"><span>คะแนนของคุณ</span><span>${scoreData.score}/${scoreData.total} (${pct}%)</span></div>
                        <div class="quiz-card-actions">
                            <button class="btn-start-quiz" disabled style="opacity:0.55;cursor:not-allowed;">✅ ทำแบบทดสอบแล้ว</button>
                        </div>
                    ` : `
                        <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:0.5rem;">ยังไม่เคยทำแบบทดสอบ • ทำได้ครั้งเดียว</p>
                        <div class="quiz-card-actions">
                            <button class="btn-start-quiz" onclick="startQuiz('${course.id}')">▶️ เริ่มทำแบบทดสอบ</button>
                        </div>
                    `}`;
            }

            // ส่วน homework ในการ์ด
            let hwSection = '';
            if (hwArr.length > 0) {
                hwSection = `
                    <div class="quiz-meta" style="margin-top:${quizCount>0?'0.85rem':'0'};">📄 การบ้าน ${hwArr.length} ชิ้น — ส่งแล้ว ${hwDone}/${hwArr.length}</div>
                    <div class="quiz-card-actions">
                        <a href="course-content.html?id=${course.id}&tab=homework" class="btn-start-quiz" style="text-decoration:none;text-align:center;display:block;">📄 ไปทำการบ้าน</a>
                    </div>`;
            }

            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <div class="quiz-card-header">
                    <div class="quiz-course-name">${escapeHtml(course.title || 'คอร์สเรียน')}</div>
                    <span class="quiz-count-badge">${quizCount > 0 ? quizCount + ' ข้อ' : hwArr.length + ' การบ้าน'}</span>
                </div>
                <div class="quiz-meta" style="margin-bottom:0.75rem;">${course.category || ''}${course.level ? ' • ' + course.level : ''}</div>
                ${quizSection}
                ${hwSection}
                <div class="quiz-card-actions" style="margin-top:0.75rem;">
                    <a href="course-content.html?id=${course.id}" class="btn-go-lesson" title="ดูบทเรียน" style="text-decoration:none;">📚 ไปที่บทเรียน</a>
                </div>`;
            grid.appendChild(card);
        });

        window.__coursesWithQuiz = allCourses;

    } catch(err) {
        console.error('loadQuizzes error:', err);
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">⚠️</div><h3>เกิดข้อผิดพลาด</h3><p>${err.message}</p></div>`;
    }
}

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let currentQuiz = null;

window.startQuiz = function(courseId) {
    // ทำได้ครั้งเดียว — ถ้าทำแล้วแจ้งเตือนและไม่ให้ทำซ้ำ
    if (window.__completedQuiz && window.__completedQuiz[courseId]) {
        const s = window.__completedQuiz[courseId];
        alert(`คุณทำแบบทดสอบนี้ไปแล้ว\nคะแนนของคุณ: ${s.score}/${s.total} (${s.pct}%)\n\nแบบทดสอบทำได้เพียงครั้งเดียวเท่านั้น`);
        return;
    }
    const course = window.__coursesWithQuiz.find(c => c.id === courseId);
    if (!course) return;
    currentQuiz = { courseId, courseName: course.title, questions: course.quiz, currentIndex: 0, score: 0, selected: null, answered: false };
    renderQuestion();
    document.getElementById('quizModalOverlay').classList.add('show');
};

function renderQuestion() {
    const { questions, currentIndex, courseName } = currentQuiz;
    const q = questions[currentIndex];
    const total = questions.length;
    const pct = Math.round((currentIndex / total) * 100);
    const choices = q.type === 'true_false' ? ['ถูก','ผิด'] : (q.choices || []);
    const labels  = ['A','B','C','D'];

    document.getElementById('quizModal').innerHTML = `
        <div class="quiz-modal-header">
            <div>
                <div style="font-weight:600;margin-bottom:0.25rem;">${courseName}</div>
                <div class="quiz-progress-info">ข้อที่ ${currentIndex+1} / ${total}</div>
            </div>
            <button class="btn-close-modal" onclick="closeQuizModal()">✕ ออก</button>
        </div>
        <div class="quiz-modal-progress-bar">
            <div class="quiz-modal-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="question-text">${currentIndex+1}. ${q.question}</div>
        <div id="choiceList">
            ${choices.map((c,i) => `
                <div class="choice-option" id="choice-${i}" onclick="selectChoice(${i})">
                    <span class="choice-letter">${labels[i]}</span>
                    <span>${c}</span>
                </div>`).join('')}
        </div>
        <button class="btn-next" id="btnNext" disabled onclick="nextQuestion()">
            ${currentIndex+1 < total ? 'ข้อถัดไป →' : 'ดูผลลัพธ์ 🎯'}
        </button>`;

    currentQuiz.selected = null;
    currentQuiz.answered = false;
}

window.selectChoice = function(index) {
    if (currentQuiz.answered) return;
    const { questions, currentIndex } = currentQuiz;
    const q = questions[currentIndex];
    const labels = ['A','B','C','D'];
    const correctIndex = labels.indexOf(q.correct);

    currentQuiz.selected = index;
    currentQuiz.answered = true;
    document.querySelectorAll('.choice-option').forEach((el,i) => { if (i===index) el.classList.add('selected'); });

    setTimeout(() => {
        document.querySelectorAll('.choice-option').forEach((el,i) => {
            if (i === correctIndex) el.classList.add('correct');
            if (i === index && i !== correctIndex) el.classList.add('wrong');
        });
        if (index === correctIndex) currentQuiz.score++;
        document.getElementById('btnNext').disabled = false;
    }, 300);
};

window.nextQuestion = function() {
    const { questions, currentIndex } = currentQuiz;
    if (currentIndex + 1 < questions.length) { currentQuiz.currentIndex++; renderQuestion(); }
    else { showResult(); }
};

async function showResult() {
    const { questions, score, courseName, courseId } = currentQuiz;
    const total = questions.length;
    const pct   = Math.round((score/total)*100);
    const emoji = pct>=80 ? '🎉' : pct>=60 ? '👍' : '📚';
    const msg   = pct>=80 ? 'ยอดเยี่ยม!' : pct>=60 ? 'ทำได้ดี!' : 'ทำได้ดีแล้ว สู้ๆ นะ';

    try {
        await supabase.from('quiz_scores').upsert({
            user_id: currentUser.id,
            course_id: courseId,
            score, total, pct,
            updated_at: new Date().toISOString()
        });
        // mark ว่าทำแล้วทันที กันทำซ้ำในเซสชันเดียวกัน
        if (!window.__completedQuiz) window.__completedQuiz = {};
        window.__completedQuiz[courseId] = { score, total, pct };
    } catch(e) { console.error('Save score error:', e); }

    document.getElementById('quizModal').innerHTML = `
        <div class="result-screen">
            <div class="result-emoji">${emoji}</div>
            <div class="result-score">${score} / ${total}</div>
            <div class="result-sub">${msg} — คะแนน ${pct}%</div>
            <div class="result-detail">
                <div class="result-stat"><div class="result-stat-num" style="color:var(--success-green);">${score}</div><div class="result-stat-label">ถูก</div></div>
                <div class="result-stat"><div class="result-stat-num" style="color:var(--danger-red);">${total-score}</div><div class="result-stat-label">ผิด</div></div>
                <div class="result-stat"><div class="result-stat-num" style="color:var(--primary-blue);">${pct}%</div><div class="result-stat-label">คะแนน</div></div>
            </div>
            <p style="color:var(--text-dim);font-size:0.82rem;margin:4px 0 16px;">📌 แบบทดสอบนี้ทำได้ครั้งเดียว คะแนนถูกบันทึกแล้ว</p>
            <button class="btn-close-result" onclick="closeQuizModal()">กลับหน้าหลัก</button>
        </div>`;

    loadQuizzes();
}

window.closeQuizModal = function() {
    document.getElementById('quizModalOverlay').classList.remove('show');
    currentQuiz = null;
};

document.getElementById('quizModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeQuizModal();
});
</script>
<script src="theme-switcher.js"></script>
</body>
</html>
