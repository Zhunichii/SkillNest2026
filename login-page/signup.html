<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillNest - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020418;
            --card-bg: #000000;
            --primary-blue: #007aff;
            --text-blue: #3b82f6;
            --text-grey: #a0a0ba;
            --input-bg: #d9d9d9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 100%, #2a2a72 0%, #020418 60%);
            overflow-y: auto;
            padding: 20px 0;
        }

        .signup-wrapper {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .brand-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            font-style: italic;
        }

        .logo-icon {
            width: 35px; height: 35px;
            background: var(--primary-blue);
            color: white;
            display: flex; justify-content: center; align-items: center;
            border-radius: 6px; font-style: normal; font-weight: bold;
        }

        .header-title { color: var(--text-blue); font-size: 1.4rem; margin-bottom: 8px; font-weight: 600; }
        .header-subtitle { color: var(--text-grey); font-size: 0.95rem; margin-bottom: 30px; font-weight: 300; }

        .signup-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title { color: var(--text-blue); margin-bottom: 25px; font-size: 1.5rem; font-weight: 600; }

        .input-group { margin-bottom: 15px; text-align: left; }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--input-bg);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #333;
            font-weight: 600;
            outline: none;
        }
        .input-field::placeholder { color: #444; font-weight: 600; }

        .btn-signup {
            width: 50%;
            padding: 12px 0;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }
        .btn-signup:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-signup:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-message { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }
        .success-message { color: #10b981; font-size: 0.85rem; margin-top: 10px; display: none; }

        .login-link { color: var(--text-grey); font-size: 0.85rem; margin-top: 15px; }
        .login-link a { color: var(--primary-blue); text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }

        .user-type-label {
            display: block;
            color: var(--text-blue);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .user-type-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .user-type-option { cursor: pointer; }
        .user-type-option input[type="radio"] { display: none; }

        .user-type-card {
            background: rgba(217, 217, 217, 0.1);
            border: 2px solid rgba(217, 217, 217, 0.2);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .user-type-option input[type="radio"]:checked + .user-type-card {
            background: rgba(0, 122, 255, 0.15);
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.3);
        }

        .user-type-card:hover { border-color: var(--primary-blue); transform: translateY(-2px); }
        .user-type-icon { font-size: 2rem; margin-bottom: 10px; }
        .user-type-title { color: white; font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .user-type-desc { color: var(--text-grey); font-size: 0.75rem; line-height: 1.3; }

        .bottom-glow {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 100px;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(80px); z-index: -1;
        }
    </style>
</head>
<body>

    <div class="signup-wrapper">
        <div class="brand-logo">
            <div class="logo-icon">W</div>
            SkillNest
        </div>
        
        <h1 class="header-title">Create your SkillNest account</h1>
        <p class="header-subtitle">Join us today</p>

        <div class="signup-card">
            <h2 class="card-title">Sign Up to SkillNest</h2>
            
            <form id="signupForm">
                <div class="input-group">
                    <input type="text" id="firstName" class="input-field" placeholder="First Name" required>
                </div>
                <div class="input-group">
                    <input type="text" id="lastName" class="input-field" placeholder="Last Name" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="Password (min 6 characters)" required minlength="6">
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm Password" required>
                </div>

                <div class="input-group">
                    <label class="user-type-label">เลือกประเภทผู้ใช้:</label>
                    <div class="user-type-container">
                        <label class="user-type-option">
                            <input type="radio" name="userType" value="student" checked required>
                            <div class="user-type-card">
                                <div class="user-type-icon">📚</div>
                                <div class="user-type-title">นักเรียน</div>
                                <div class="user-type-desc">เข้ามาเรียนและดูเนื้อหา</div>
                            </div>
                        </label>
                        <label class="user-type-option">
                            <input type="radio" name="userType" value="teacher" required>
                            <div class="user-type-card">
                                <div class="user-type-icon">👨‍🏫</div>
                                <div class="user-type-title">ครู</div>
                                <div class="user-type-desc">สามารถอัพโหลดเนื้อหาได้</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-signup" id="signupBtn">Sign Up</button>
                
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                
                <p class="login-link">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </form>
        </div>
    </div>

    <div class="bottom-glow"></div>

    <script type="module">
        import { supabase } from './supabase.js';

        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const userType = document.querySelector('input[name="userType"]:checked').value;

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match!';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters!';
                errorMessage.style.display = 'block';
                return;
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating Account...';

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                let errorMsg = 'An error occurred. Please try again.';
                if (error.message.includes('already registered')) errorMsg = 'This email is already registered!';
                else if (error.message.includes('invalid')) errorMsg = 'Invalid email address!';
                else if (error.message.includes('weak')) errorMsg = 'Password is too weak!';
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                signupBtn.disabled = false;
                signupBtn.textContent = 'Sign Up';
                return;
            }

            // อัปเดต first_name, last_name, user_type หลัง signUp
            // (Trigger จาก Step 1 สร้าง row ใน public.users แล้ว)
            if (data.user) {
                await supabase.from('users').update({
                    first_name: firstName,
                    last_name: lastName,
                    user_type: userType
                }).eq('id', data.user.id);
            }

            successMessage.textContent = 'Account created successfully! Redirecting...';
            successMessage.style.display = 'block';

            setTimeout(() => {
                // แก้ไขจาก ../index.html เป็น index.html เพื่อให้ path ถูกต้อง
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>

</body>
</html>
