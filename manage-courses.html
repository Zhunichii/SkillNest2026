<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการคอร์สของฉัน - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020418;
            --primary-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #a0a0ba;
            --card-bg: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background: radial-gradient(circle at 50% 0%, #1a1a4d 0%, #020418 60%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-back {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-back:hover { color: white; }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .manage-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .manage-card:hover { transform: translateY(-2px); border-color: var(--primary-blue); }

        .card-info h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .card-info p { color: var(--text-dim); font-size: 0.9rem; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-edit:hover {
            background: #3b82f6;
            color: white;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .card-info .stats {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .loading { text-align: center; color: var(--text-dim); margin-top: 2rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-dim); border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📂 จัดการคอร์สของคุณ</h1>
            <a href="dashboard.html" class="btn-back">← กลับหน้าหลัก</a>
        </div>

        <div id="courseList" class="course-list">
            <div class="loading">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // --- ตั้งค่า Firebase Config (ใช้ชุดเดียวกับ dashboard.html) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBDvhHzbh8KV4hh_owDABrP1itijZ6fNaw",
            authDomain: "skillnest-2026.firebaseapp.com",
            projectId: "skillnest-2026",
            storageBucket: "skillnest-2026.firebasestorage.app",
            messagingSenderId: "416822065212",
            appId: "1:416822065212:web:f7d9356073bacbf5f9ab39"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const listContainer = document.getElementById('courseList');

        // ตรวจสอบ Login
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // ตรวจสอบว่าเป็นครูหรือไม่
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        const userType = userData.userType || 'student';
                        
                        // ถ้าไม่ใช่ครู ให้ redirect กลับไปหน้า dashboard
                        if (userType !== 'teacher') {
                            alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ เฉพาะครูเท่านั้นที่สามารถจัดการคอร์สได้');
                            window.location.href = 'dashboard.html';
                            return;
                        }
                        
                        // ถ้าเป็นครู ให้โหลดคอร์สของครูคนนี้
                        loadMyCourses(user.uid);
                    }
                } catch (error) {
                    console.error('Error checking user permissions:', error);
                    alert('เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์');
                    window.location.href = 'dashboard.html';
                }
            } else {
                // ถ้าไม่ได้ Login ให้เด้งไปหน้า Login
                window.location.href = '../login-page/login.html';
            }
        });

        // ฟังก์ชันดึงข้อมูล
        async function loadMyCourses(userId) {
            try {
                // ค้นหาคอร์สที่ creatorId ตรงกับ user นี้
                const q = query(
                    collection(db, 'courses'), 
                    where('creatorId', '==', userId)
                );
                
                const snapshot = await getDocs(q);
                listContainer.innerHTML = ''; // เคลียร์ Loading

                if (snapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>ยังไม่มีคอร์สที่คุณสร้าง</h3>
                            <p>เริ่มสร้างคอร์สแรกของคุณได้ที่หน้า Dashboard</p>
                        </div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const course = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'manage-card';
                    
                    const dateStr = course.createdAt ? new Date(course.createdAt.seconds * 1000).toLocaleDateString('th-TH') : '-';
                    const updatedStr = course.updatedAt ? ` · แก้ไขล่าสุด ${new Date(course.updatedAt.seconds * 1000).toLocaleDateString('th-TH')}` : '';
                    const lessonCount = course.lessons?.length || 0;
                    const quizCount = course.quiz?.length || 0;
                    const hwCount = course.homework?.length || 0;

                    card.innerHTML = `
                        <div class="card-info">
                            <h3>${course.title}</h3>
                            <p>หมวดหมู่: ${course.category} · ระดับ: ${course.level || 'ทั่วไป'}</p>
                            <p style="font-size:0.8rem; color:#666;">สร้าง: ${dateStr}${updatedStr}</p>
                            <div class="stats">
                                <span class="stat-badge">📚 ${lessonCount} บทเรียน</span>
                                ${quizCount > 0 ? `<span class="stat-badge">🧠 ${quizCount} quiz</span>` : ''}
                                ${hwCount > 0 ? `<span class="stat-badge">📋 ${hwCount} การบ้าน</span>` : ''}
                            </div>
                        </div>
                        <div class="card-actions">
                            <a href="edit-course.html?id=${docSnap.id}" class="btn-edit">✏️ แก้ไข</a>
                            <button class="btn-delete" data-id="${docSnap.id}" data-title="${course.title}">🗑️ ลบ</button>
                        </div>
                    `;
                    
                    card.querySelector('.btn-delete').onclick = () => handleDelete(docSnap.id, course.title);
                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = '<p style="color:red; text-align:center;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        // ฟังก์ชันลบ
        window.handleDelete = async (courseId, courseTitle) => {
            if(!confirm(`คุณต้องการลบคอร์ส "${courseTitle}" ใช่หรือไม่? \n(การกระทำนี้ไม่สามารถย้อนกลับได้)`)) return;

            try {
                await deleteDoc(doc(db, 'courses', courseId));
                alert('ลบคอร์สเรียบร้อยแล้ว');
                // โหลดหน้าใหม่เพื่ออัปเดตรายการ
                location.reload();
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        }
    </script>
</body>
</html>
