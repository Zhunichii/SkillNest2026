<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการคอร์สของฉัน - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-back {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-back:hover { color: var(--text-main); }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .manage-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .manage-card:hover { transform: translateY(-2px); border-color: var(--primary-blue); }

        .card-info h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .card-info p { color: var(--text-dim); font-size: 0.9rem; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .btn-edit:hover {
            background: var(--primary-blue);
            color: white;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .card-info .stats {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .loading { text-align: center; color: var(--text-dim); margin-top: 2rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-dim); border: 1px dashed var(--border-color); border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📂 จัดการคอร์สของคุณ</h1>
            <a href="dashboard.html" class="btn-back">← กลับหน้าหลัก</a>
        </div>

        <div id="courseList" class="course-list">
            <div class="loading">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        const listContainer = document.getElementById('courseList');

        // ตรวจสอบ Login
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) { window.location.href = '../login-page/login.html'; }
        else {
            const { data: profile } = await supabase.from('users').select('user_type').eq('id', user.id).single();
            if (profile?.user_type !== 'teacher') {
                alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ เฉพาะครูเท่านั้นที่สามารถจัดการคอร์สได้');
                window.location.href = 'dashboard.html';
            } else {
                loadMyCourses(user.id);
            }
        }

        // ฟังก์ชันดึงข้อมูล
        async function loadMyCourses(userId) {
            const { data: courses, error } = await supabase
                .from('courses')
                .select('*')
                .eq('creator_id', userId)
                .order('created_at', { ascending: false });

            listContainer.innerHTML = '';

            if (error) {
                listContainer.innerHTML = '<p style="color:red; text-align:center;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
                return;
            }

            if (!courses || courses.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>ยังไม่มีคอร์สที่คุณสร้าง</h3>
                        <p>เริ่มสร้างคอร์สแรกของคุณได้ที่หน้า Dashboard</p>
                    </div>`;
                return;
            }

            courses.forEach((course) => {
                const card = document.createElement('div');
                card.className = 'manage-card';

                const dateStr = course.created_at ? new Date(course.created_at).toLocaleDateString('th-TH') : '-';
                const updatedStr = course.updated_at ? ` · แก้ไขล่าสุด ${new Date(course.updated_at).toLocaleDateString('th-TH')}` : '';
                const lessonCount = course.lessons?.length || 0;
                const quizCount = course.quiz?.length || 0;
                const hwCount = course.homework?.length || 0;

                card.innerHTML = `
                    <div class="card-info">
                        <h3>${course.title}</h3>
                        <p>หมวดหมู่: ${course.category} · ระดับ: ${course.level || 'ทั่วไป'}</p>
                        <p style="font-size:0.8rem; color:var(--text-faint, #666);">สร้าง: ${dateStr}${updatedStr}</p>
                        <div class="stats">
                            <span class="stat-badge">📚 ${lessonCount} บทเรียน</span>
                            ${quizCount > 0 ? `<span class="stat-badge">🧠 ${quizCount} quiz</span>` : ''}
                            ${hwCount > 0 ? `<span class="stat-badge">📋 ${hwCount} การบ้าน</span>` : ''}
                        </div>
                    </div>
                    <div class="card-actions">
                        <a href="edit-course.html?id=${course.id}" class="btn-edit">✏️ แก้ไข</a>
                        <button class="btn-delete" data-id="${course.id}" data-title="${course.title}">🗑️ ลบ</button>
                    </div>
                `;

                card.querySelector('.btn-delete').onclick = () => handleDelete(course.id, course.title);
                listContainer.appendChild(card);
            });
        }

        // ฟังก์ชันลบ
        window.handleDelete = async (courseId, courseTitle) => {
            if (!confirm(`คุณต้องการลบคอร์ส "${courseTitle}" ใช่หรือไม่?\n(การกระทำนี้ไม่สามารถย้อนกลับได้)`)) return;

            const { error } = await supabase.from('courses').delete().eq('id', courseId);
            if (error) { alert('เกิดข้อผิดพลาด: ' + error.message); return; }
            alert('ลบคอร์สเรียบร้อยแล้ว');
            location.reload();
        }
    </script>
    <script src="theme-switcher.js"></script>
</body>
</html>
