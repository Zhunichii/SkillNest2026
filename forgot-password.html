<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - SkillNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        h1, h2, h3, .logo, .logo-mock, .course-title, .card-stat-value,
        .page-title, .nav-logo, .section-title, .avatar-header-title,
        .modal-title, .stat-value, .quiz-title {
            font-family: var(--font-display, 'Space Grotesk', sans-serif);
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        body {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background: radial-gradient(circle at 50% 0%, #161B3A 0%, #0A0E27 60%);
            background-image:
                radial-gradient(circle at 50% 0%, #161B3A 0%, #0A0E27 60%),
                radial-gradient(circle at 1px 1px, rgba(226,232,240,0.025) 1px, transparent 0);
            background-size: 100% 100%, 26px 26px;
            color:white; padding:20px;
        }
        .card {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            border-radius:20px; padding:40px; width:100%; max-width:420px;
        }
        .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.3rem; margin-bottom:32px; }
        .logo-icon { background:#6366F1; padding:4px 10px; border-radius:6px; }
        h1 { font-size:1.5rem; margin-bottom:8px; }
        p  { color:#a0a0ba; font-size:0.9rem; margin-bottom:28px; line-height:1.6; }
        label { display:block; font-size:0.85rem; color:#a0a0ba; margin-bottom:6px; }
        input {
            width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
            border-radius:10px; padding:12px 16px; color:white; font-size:0.95rem; outline:none;
            transition:0.2s; margin-bottom:20px;
        }
        input:focus { border-color:#6366F1; background:rgba(99,102,241,0.06); }
        .btn {
            width:100%; padding:14px; background:linear-gradient(135deg,#6366F1,#4338CA);
            color:white; border:none; border-radius:10px; font-size:1rem; font-weight:600;
            cursor:pointer; transition:0.2s;
        }
        .btn:hover { opacity:0.9; transform:translateY(-1px); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .msg { padding:12px 16px; border-radius:10px; font-size:0.88rem; margin-bottom:16px; display:none; }
        .msg.success { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:#10b981; }
        .msg.error   { background:rgba(239,68,68,0.15);  border:1px solid rgba(239,68,68,0.3);  color:#ef4444; }
        .back-link { text-align:center; margin-top:20px; font-size:0.88rem; color:#a0a0ba; }
        .back-link a { color:#6366F1; text-decoration:none; }
        .back-link a:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><span class="logo-icon">W</span> SkillNest</div>
    <h1>ลืมรหัสผ่าน?</h1>
    <p>กรอก email ที่ใช้สมัคร เราจะส่งลิงก์รีเซ็ตรหัสผ่านให้คุณทันที</p>

    <div class="msg" id="msgBox"></div>

    <div id="formSection">
        <label>อีเมล</label>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
        <button class="btn" id="submitBtn" onclick="sendResetEmail()">📧 ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
    </div>

    <div class="back-link">
        <a href="login.html">← กลับหน้า Login</a>
    </div>
</div>

<script type="module">
import { supabase } from '../supabase.js';

window.sendResetEmail = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const btn   = document.getElementById('submitBtn');
    const msg   = document.getElementById('msgBox');

    if (!email) {
        showMsg('กรุณากรอก email ก่อนครับ', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ กำลังส่ง...';
    msg.style.display = 'none';

    try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}/login-page/reset-password.html`
        });

        if (error) throw error;

        showMsg('✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ ' + email + ' แล้ว กรุณาตรวจสอบ inbox (รวมถึง spam)', 'success');
        document.getElementById('formSection').style.opacity = '0.5';
        document.getElementById('formSection').style.pointerEvents = 'none';

    } catch(e) {
        showMsg('❌ ' + (e.message || 'เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'), 'error');
        btn.disabled = false;
        btn.textContent = '📧 ส่งลิงก์รีเซ็ตรหัสผ่าน';
    }
};

function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
}

document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.sendResetEmail();
});
</script>
<script src="theme-switcher.js"></script>
</body>
</html>
